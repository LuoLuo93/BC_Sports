name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: project

    steps:
      # 1. 停止旧服务
      - name: Stop Old Service
        shell: powershell
        run: |
          Write-Host "Stopping old production service..."
          $nssmPath = "D:\tools\nssm.exe"
          if (Test-Path $nssmPath) {
            & $nssmPath stop "BC-Sports-Admin" 2>$null
          }
          taskkill /F /IM java.exe 2>$null
          Start-Sleep -Seconds 3
          Write-Host "Done"
        continue-on-error: true

      # 2. 拉取代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 3. 构建前端
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          Write-Host "Frontend build completed"

      # 4. 构建后端
      - name: Build Backend
        run: |
          mvnd clean package -DskipTests -q -U
          if (-not (Test-Path "target/bc-sports-admin-1.0.0.jar")) {
            Write-Host "ERROR: JAR file not found!"
            exit 1
          }
          Write-Host "Backend build completed"

      # 5. 创建 Windows 服务
      - name: Setup Windows Service
        shell: powershell
        run: |
          $serviceName = "BC-Sports-Admin"
          $projectDir = "D:\B.C.Sports\actions-runner\_work\BC_Sports\BC_Sports\project"
          $nssmPath = "D:\tools\nssm.exe"

          # 刷新环境变量
          $env:PATH = [Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + [Environment]::GetEnvironmentVariable("PATH", "User")

          # 检查 java
          $javaPath = (Get-Command java -ErrorAction SilentlyContinue).Source
          if (-not $javaPath) {
            Write-Host "ERROR: java not found in PATH!"
            exit 1
          }
          Write-Host "Java found at: $javaPath"

          # 停止并删除旧服务（忽略错误）
          Write-Host "Removing old service if exists..."
          try {
            & $nssmPath stop $serviceName 2>$null
          } catch {}
          try {
            & $nssmPath remove $serviceName confirm 2>$null
          } catch {}

          # 创建新服务（生产环境使用 prod profile）
          Write-Host "Creating new production service..."
          & $nssmPath install $serviceName $javaPath "-Djava.security.properties=./tls-override.security -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8 -Duser.language=zh -Duser.region=CN -Xms8g -Xmx16g -jar target/bc-sports-admin-1.0.0.jar --spring.profiles.active=prod"
          & $nssmPath set $serviceName AppDirectory $projectDir
          & $nssmPath set $serviceName DisplayName "BC Sports Admin System"
          & $nssmPath set $serviceName Description "BC Sports Admin Backend Service - Production"
          & $nssmPath set $serviceName Start SERVICE_AUTO_START
          & $nssmPath set $serviceName AppStdout "$projectDir\logs\prod-service-stdout.log"
          & $nssmPath set $serviceName AppStderr "$projectDir\logs\prod-service-stderr.log"

          # 启动服务
          Write-Host "Starting production service..."
          & $nssmPath start $serviceName

          Start-Sleep -Seconds 10

          $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
          if ($service -and $service.Status -eq "Running") {
            Write-Host "Production service installed and started successfully!"
          } else {
            Write-Host "WARNING: Service may not have started."
          }

      # 6. 验证服务
      - name: Verify Service
        shell: powershell
        run: |
          $maxWait = 60
          $waited = 0

          while ($waited -lt $maxWait) {
            Start-Sleep -Seconds 5
            $waited += 5

            $listening = netstat -ano | Select-String ":9091 " | Select-String "LISTENING"
            if ($listening) {
              Write-Host "Production service is running on port 9091!"
              return
            }

            Write-Host "Waiting for service... ($waited/$maxWait seconds)"
          }

          Write-Host "WARNING: Service may not be listening on port 9091"

      # 7. 健康检查
      - name: Health Check
        shell: powershell
        run: |
          try {
            $response = Invoke-WebRequest -Uri "http://localhost:9091/actuator/health" -UseBasicParsing -TimeoutSec 10
            if ($response.StatusCode -eq 200) {
              Write-Host "Health check passed!"
              Write-Host "Response: $($response.Content)"
            } else {
              Write-Host "WARNING: Health check returned status $($response.StatusCode)"
            }
          } catch {
            Write-Host "WARNING: Health check failed: $($_.Exception.Message)"
          }

      # 8. 部署完成
      - name: Deploy Complete
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "====================================="
          Write-Host "  Production Deployment completed!"
          Write-Host "  URL: http://192.168.5.180:9091"
          Write-Host "  API Docs: http://192.168.5.180:9091/doc.html"
          Write-Host "  Service: BC-Sports-Admin"
          Write-Host "====================================="
