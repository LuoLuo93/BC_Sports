name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: project

    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v4

      - name: 构建前端
        run: |
          cd frontend
          npm install
          npm run build

      - name: 构建后端
        run: mvnd clean package -DskipTests -q -U

      - name: Stop Old Service
        shell: powershell
        run: |
          $connections = netstat -aon | Select-String ":8080 " | Select-String "LISTENING"
          if ($connections) {
            $connections | ForEach-Object {
              $pid = ($_ -split '\s+')[-1]
              Write-Host "Stopping process PID: $pid"
              Stop-Process -Id $pid -Force
            }
            Write-Host "Waiting for port release..."
            Start-Sleep -Seconds 3
          } else {
            Write-Host "Port 8080 has no running process"
          }

      - name: Start New Service
        shell: powershell
        run: |
          # Build the command
          $cmd = "java -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8 -Duser.language=zh -Duser.region=CN"
          if (Test-Path "tls-override.security") {
            $cmd = "$cmd -Djava.security.properties=./tls-override.security"
          }
          $cmd = "$cmd -jar target/bc-sports-admin-1.0.0.jar --spring.profiles.active=prod"

          Write-Host "Starting service with command: $cmd"

          # Use cmd /c to start the process (more reliable)
          Start-Process -FilePath "cmd" -ArgumentList "/c", "$cmd" -WindowStyle Hidden

          # Wait for service to start
          Write-Host "Waiting for service to start (20 seconds)..."
          Start-Sleep -Seconds 20

          # Check if service started
          $javaProcess = Get-Process -Name "java" -ErrorAction SilentlyContinue
          if ($javaProcess) {
            Write-Host "Service started successfully! PID: $($javaProcess.Id)"
          } else {
            Write-Host "ERROR: Service failed to start!"
            exit 1
          }
