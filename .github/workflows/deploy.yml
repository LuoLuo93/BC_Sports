name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: project

    steps:
      # 1. 停止旧服务（在 checkout 之前，避免文件锁定）
      - name: Stop Old Service
        shell: powershell
        run: |
          Write-Host "Stopping any running Java processes..."
          taskkill /F /IM java.exe 2>$null
          Start-Sleep -Seconds 3
          Write-Host "Done"

      # 2. 拉取最新代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 3. 构建前端
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          Write-Host "Frontend build completed"

      # 4. 构建后端
      - name: Build Backend
        run: |
          mvnd clean package -DskipTests -q -U
          if (-not (Test-Path "target/bc-sports-admin-1.0.0.jar")) {
            Write-Host "ERROR: JAR file not found!"
            exit 1
          }
          Write-Host "Backend build completed"

      # 5. 启动新服务
      - name: Start New Service
        shell: powershell
        run: |
          # Build the command
          $cmd = "java -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8 -Duser.language=zh -Duser.region=CN -Xms4g -Xmx8g"
          if (Test-Path "tls-override.security") {
            $cmd = "$cmd -Djava.security.properties=./tls-override.security"
          }
          $cmd = "$cmd -jar target/bc-sports-admin-1.0.0.jar --spring.profiles.active=prod"

          Write-Host "Starting service..."
          Start-Process -FilePath "cmd" -ArgumentList "/c", "$cmd" -WindowStyle Hidden

          # Wait for service to start with timeout
          $maxWait = 60
          $waited = 0
          $started = $false

          while ($waited -lt $maxWait) {
            Start-Sleep -Seconds 5
            $waited += 5

            # Check if Java process exists
            $javaProcess = Get-Process -Name "java" -ErrorAction SilentlyContinue
            if (-not $javaProcess) {
              Write-Host "ERROR: Java process died! Check logs."
              Get-Content logs\admin.log -Tail 50
              exit 1
            }

            # Check if port 8080 is listening
            $listening = netstat -ano | Select-String ":8080 " | Select-String "LISTENING"
            if ($listening) {
              $started = $true
              Write-Host "Service started successfully after $waited seconds!"
              Write-Host "PID: $($javaProcess.Id)"
              break
            }

            Write-Host "Waiting for service to start... ($waited/$maxWait seconds)"
          }

          if (-not $started) {
            Write-Host "ERROR: Service failed to start within $maxWait seconds!"
            Get-Content logs\admin.log -Tail 50
            exit 1
          }

      # 6. 健康检查
      - name: Health Check
        shell: powershell
        run: |
          Start-Sleep -Seconds 5

          try {
            $response = Invoke-WebRequest -Uri "http://localhost:8080/actuator/health" -UseBasicParsing -TimeoutSec 10
            if ($response.StatusCode -eq 200) {
              Write-Host "Health check passed!"
              Write-Host "Response: $($response.Content)"
            } else {
              Write-Host "WARNING: Health check returned status $($response.StatusCode)"
            }
          } catch {
            Write-Host "WARNING: Health check failed: $($_.Exception.Message)"
          }

          Write-Host ""
          Write-Host "====================================="
          Write-Host "  Deployment completed!"
          Write-Host "  URL: http://192.168.5.180:8080"
          Write-Host "  API Docs: http://192.168.5.180:8080/doc.html"
          Write-Host "====================================="
