# 生产环境配置（覆盖 application.yml 中的默认值）
server:
  port: 9091
  servlet:
    context-path: /bcsports

spring:
  datasource:
    url: jdbc:oracle:thin:@192.168.5.174:1521:BCSports
    username: bc
    password: abc123
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      phy-timeout-millis: 1800000
      validation-query: SELECT 1 FROM DUAL
      validation-query-timeout: 5
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      keep-alive: true
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      use-global-data-source-stat: true

# 生产环境日志级别
logging:
  level:
    com.bcsport.admin: INFO
    com.bcsport.admin.mapper: WARN
    org.springframework: WARN
    org.apache.shiro: WARN

# 生产环境上传路径（必须在项目外部，避免重新部署时文件丢失）
bc.upload.path: D:/B.C.Sports/uploads

# 贴纸打印 Agent 共享密钥：生产环境通过环境变量 AGENT_API_KEY 注入，不在仓库存明文
agent:
  api-key: ${AGENT_API_KEY:}
