server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: bc-sports-admin
  profiles:
    active: dev
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@//localhost:1521/freepdb1
    username: ${DB_USERNAME:BC_ERP_MANAGE}
    password: ${DB_PASSWORD:123456}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      use-global-data-source-stat: true
    # IHR模块 SQL Server 数据源 (独立库 BC_SPORTS_IHR)
    ihr:
      type: com.alibaba.druid.pool.DruidDataSource
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
      url: jdbc:sqlserver://192.168.5.152:1433;DatabaseName=BC_SPORTS_IHR;encrypt=false;trustServerCertificate=true;socketTimeout=600000;queryTimeout=600000;loginTimeout=60
      username: ${IHR_DB_USERNAME:sa}
      password: ${IHR_DB_PASSWORD:northland2047.}
      druid:
        initial-size: 3
        min-idle: 3
        max-active: 20
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        validation-query: SELECT 1
        validation-query-timeout: 5
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        keep-alive: true
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
        filters: stat,wall,slf4j
        connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
    # 企业微信 SQL Server 数据源 (独立库 BC_SPORTS_QYWX)
    qywx:
      type: com.alibaba.druid.pool.DruidDataSource
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
      url: jdbc:sqlserver://192.168.5.152:1433;DatabaseName=BC_SPORTS_QYWX;encrypt=false;trustServerCertificate=true;socketTimeout=600000;queryTimeout=600000;loginTimeout=60
      username: ${QYWX_DB_USERNAME:sa}
      password: ${QYWX_DB_PASSWORD:northland2047.}
      druid:
        initial-size: 3
        min-idle: 3
        max-active: 10
        max-wait: 60000
        time-between-eviction-runs-millis: 30000
        min-evictable-idle-time-millis: 300000
        max-wait-thread-count: 10
        validation-query: SELECT 1
        validation-query-timeout: 5
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        keep-alive: true
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
        filters: stat,wall,slf4j
        connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
    # 伯俊ERP Oracle 数据源
    bjerp:
      type: com.alibaba.druid.pool.DruidDataSource
      driver-class-name: oracle.jdbc.OracleDriver
      url: jdbc:oracle:thin:@//${BJERP_DB_HOST:192.168.5.174}:${BJERP_DB_PORT:1521}/${BJERP_DB_SERVICE:orcl}
      username: ${BJERP_DB_USERNAME:bosnds3}
      password: ${BJERP_DB_PASSWORD:abc123}
      druid:
        initial-size: 3
        min-idle: 3
        max-active: 15
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        validation-query: SELECT 1 FROM DUAL
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        keep-alive: true
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
        filters: stat,wall,slf4j
        connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: ''
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: 30000ms
        max-idle: 8
        min-idle: 2
  # Thymeleaf 配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false
    servlet:
      content-type: text/html
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.bcsport.admin.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    # Oracle 方言配置
    db-type: oracle

# Shiro 配置
shiro:
  sessionManager:
    sessionIdUrlRewritingEnabled: false
  web:
    enabled: true
  filter:
    chain-definition-manager:
      chain-definitions:
        /login anon
        /doLogin anon
        /assets/** anon
        /static/** anon
        /css/** anon
        /js/** anon
        /images/** anon
        /favicon.ico anon
        /** authc

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: false
    enable-document-manage: false

