server:
  port: 8080
  servlet:
    context-path: /bcsports
  tomcat:
    max-threads: 200
    min-spare-threads: 20
    max-connections: 8192
    accept-count: 100

# 贴纸打印 Agent 共享密钥（C# 客户端通过 X-API-Key 请求头携带）。
# 默认 local-dev-key 便于本地联调；生产环境用环境变量 AGENT_API_KEY 覆盖，不在仓库存明文。
agent:
  api-key: ${AGENT_API_KEY:local-dev-key}
  task:
    # 任务派发后超过该分钟数未回报视为卡住，触发重派；必须大于单任务最大物理打印耗时，否则可能误重派导致重复打印
    stuck-minutes: ${AGENT_TASK_STUCK_MINUTES:5}
    # 单个任务最大重派次数，超过则标记失败不再下发
    max-redispatch: ${AGENT_TASK_MAX_REDISPATCH:3}

spring:
  application:
    name: bc-sports-admin
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  devtools:
    restart:
      enabled: false
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@//192.168.104.167:1521/freepdb1
    username: ${DB_USERNAME:BC_ERP_MANAGE}
    password: ${DB_PASSWORD:123456}
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      phy-timeout-millis: 1800000
      validation-query: SELECT 1 FROM DUAL
      validation-query-timeout: 5
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      keep-alive: true
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      use-global-data-source-stat: true
    # IHR模块 SQL Server 数据源 (独立库 BC_SPORTS_IHR)
    ihr:
      type: com.alibaba.druid.pool.DruidDataSource
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
      url: jdbc:sqlserver://192.168.5.152:1433;DatabaseName=BC_SPORTS_IHR;encrypt=false;trustServerCertificate=true;socketTimeout=300000;queryTimeout=300000;loginTimeout=60
      username: ${IHR_DB_USERNAME:sa}
      password: ${IHR_DB_PASSWORD:northland2047.}
      druid:
        initial-size: 10
        min-idle: 10
        max-active: 50
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        phy-timeout-millis: 1800000
        validation-query: SELECT 1
        validation-query-timeout: 5
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        keep-alive: true
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
        filters: stat,wall,slf4j
        connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
        # 防止数据库重启后连接池自动关闭
        break-after-acquire-failure: false
        connection-error-retry-attempts: 3
        time-between-connect-error-millis: 30000
    # 企业微信 SQL Server 数据源 (独立库 BC_SPORTS_QYWX)
    qywx:
      type: com.alibaba.druid.pool.DruidDataSource
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
      url: jdbc:sqlserver://192.168.5.152:1433;DatabaseName=BC_SPORTS_QYWX;encrypt=false;trustServerCertificate=true;socketTimeout=300000;queryTimeout=300000;loginTimeout=60
      username: ${QYWX_DB_USERNAME:sa}
      password: ${QYWX_DB_PASSWORD:northland2047.}
      druid:
        initial-size: 10
        min-idle: 10
        max-active: 50
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        phy-timeout-millis: 1800000
        validation-query: SELECT 1
        validation-query-timeout: 5
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        keep-alive: true
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
        filters: stat,wall,slf4j
        connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
        # 防止数据库重启后连接池自动关闭
        break-after-acquire-failure: false
        connection-error-retry-attempts: 3
