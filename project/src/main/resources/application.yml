      url: jdbc:sqlserver://${HKERP_DB_HOST:10.10.0.25}:${HKERP_DB_PORT:1433};DatabaseName=${HKERP_DB_NAME:HKERP};encrypt=false;trustServerCertificate=true;socketTimeout=300000;queryTimeout=300000;loginTimeout=60
      username: ${HKERP_DB_USERNAME:sa}
      password: ${HKERP_DB_PASSWORD:BCsport)(*&.}
      druid:
        initial-size: 5
        min-idle: 5
        max-active: 30
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        phy-timeout-millis: 1800000
        validation-query: SELECT 1
        validation-query-timeout: 5
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        keep-alive: true
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
        filters: stat,wall,slf4j
        connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
        # 防止数据库重启后连接池自动关闭
        break-after-acquire-failure: false
