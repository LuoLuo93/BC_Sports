      driver-class-name: oracle.jdbc.OracleDriver
      url: jdbc:oracle:thin:@//${BJERP_DB_HOST:192.168.5.174}:${BJERP_DB_PORT:1521}/${BJERP_DB_SERVICE:orcl}
      username: ${BJERP_DB_USERNAME:bosnds3}
      password: ${BJERP_DB_PASSWORD:abc123}
      druid:
        initial-size: 3
        min-idle: 3
        max-active: 15
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        phy-timeout-millis: 1800000
        validation-query: SELECT 1 FROM DUAL
        validation-query-timeout: 5
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        keep-alive: true
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
        filters: stat,wall,slf4j
        connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
  # Redis 配置（Spring Boot 3.x 使用 spring.data.redis 前缀）
  data:
    redis:
      host: localhost
      port: 6379
      password: ''
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: 30000ms
          max-idle: 8
          min-idle: 2
  # Thymeleaf 配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false
    servlet:
      content-type: text/html
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.bcsport.admin.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    # Oracle 方言配置
    db-type: oracle

# Shiro 配置
shiro:
  sessionManager:
    sessionIdUrlRewritingEnabled: false
  web:
    enabled: true
  filter:
    chain-definition-manager:
      chain-definitions:
        /bcsports/login anon
        /bcsports/doLogin anon
        /bcsports/api/config/public anon
        /bcsports/assets/** anon
        /bcsports/static/** anon
        /bcsports/css/** anon
        /bcsports/js/** anon
        /bcsports/images/** anon
        /bcsports/favicon.ico anon
        /bcsports/index.avif anon
        /bcsports/index.html anon
        "/**" authc

