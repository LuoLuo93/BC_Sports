<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基础数据管理 - BC体育后台管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .brand-logo-preview {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: contain;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div th:replace="~{common/fragments :: sidebar}"></div>

    <div class="main-content">
        <nav th:replace="~{common/fragments :: top-navbar}"></nav>

        <div class="content-wrapper">
            <div class="bc-card">
                <div class="bc-card-body">

                    <!-- ==================== Tab导航栏 ==================== -->
                    <ul class="nav nav-tabs mb-3" id="mainTabs">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" data-tab="brand">
                                <i class="bi bi-tags"></i> 品牌管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-tab="region">
                                <i class="bi bi-geo-alt"></i> 地区管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-tab="channelType">
                                <i class="bi bi-diagram-3"></i> 渠道类型
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-tab="channelNature">
                                <i class="bi bi-layers"></i> 渠道性质
                            </a>
                        </li>
                    </ul>

                    <!-- ==================== 品牌管理 搜索表单 ==================== -->
                    <form class="row g-3 bc-toolbar align-items-center tab-search-form" id="searchForm_brand" data-tab="brand">
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-tag"></i>
                                <input type="text" class="bc-input" id="searchBrandName" placeholder="搜索品牌名称...">
                            </div>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchBrandStatus">
                                <option value="">全部状态</option>
                                <option value="1">正常</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn bc-btn-primary" id="searchBrandBtn">
                                <i class="bi bi-search"></i> 查询
                            </button>
                            <button type="button" class="btn bc-btn-secondary" id="resetBrandBtn">
                                <i class="bi bi-arrow-counterclockwise"></i> 重置
                            </button>
                        </div>
                        <div class="col-auto ms-auto" th:if="${#lists.contains(permissions, '*') or #lists.contains(permissions, 'bi:brand:add')}">
                            <button type="button" class="btn bc-btn-success" id="addBrandBtn">
                                <i class="bi bi-plus-lg"></i> 新增品牌
                            </button>
                        </div>
                    </form>

                    <!-- ==================== 地区管理 搜索表单 ==================== -->
                    <form class="row g-3 bc-toolbar align-items-center tab-search-form" id="searchForm_region" data-tab="region" style="display:none;">
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-geo-alt"></i>
                                <input type="text" class="bc-input" id="searchRegionName" placeholder="搜索区域名称或行政编码...">
                            </div>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchRegionLevel1">
                                <option value="">全部一级地区</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchRegionLevel2">
                                <option value="">全部二级地区</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchRegionStatus">
                                <option value="">全部状态</option>
                                <option value="1">正常</option>
                                <option value="0">停用</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn bc-btn-primary" id="searchRegionBtn">
                                <i class="bi bi-search"></i> 查询
                            </button>
                            <button type="button" class="btn bc-btn-secondary" id="resetRegionBtn">
                                <i class="bi bi-arrow-counterclockwise"></i> 重置
                            </button>
                        </div>
                        <div class="col-auto ms-auto" th:if="${#lists.contains(permissions, '*') or #lists.contains(permissions, 'bi:region:add')}">
                            <button type="button" class="btn bc-btn-success" id="addRegionBtn">
                                <i class="bi bi-plus-lg"></i> 新增区域
                            </button>
                        </div>
                    </form>

                    <!-- ==================== 渠道类型 搜索表单 ==================== -->
                    <form class="row g-3 bc-toolbar align-items-center tab-search-form" id="searchForm_channelType" data-tab="channelType" style="display:none;">
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-diagram-3"></i>
                                <input type="text" class="bc-input" id="searchChannelTypeName" placeholder="搜索类型名称或编码...">
                            </div>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchChannelTypeLevel1">
                                <option value="">所有渠道类型</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchChannelTypeLevel2">
                                <option value="">所有渠道定义</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchChannelTypeStatus">
                                <option value="">全部状态</option>
                                <option value="1">正常</option>
                                <option value="0">停用</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn bc-btn-primary" id="searchChannelTypeBtn">
                                <i class="bi bi-search"></i> 查询
                            </button>
                            <button type="button" class="btn bc-btn-secondary" id="resetChannelTypeBtn">
                                <i class="bi bi-arrow-counterclockwise"></i> 重置
                            </button>
                        </div>
                        <div class="col-auto ms-auto" th:if="${#lists.contains(permissions, '*') or #lists.contains(permissions, 'bi:channelType:add')}">
                            <button type="button" class="btn bc-btn-success" id="addChannelTypeBtn">
                                <i class="bi bi-plus-lg"></i> 新增类型
                            </button>
                        </div>
                    </form>

                    <!-- ==================== 渠道性质 搜索表单 ==================== -->
                    <form class="row g-3 bc-toolbar align-items-center tab-search-form" id="searchForm_channelNature" data-tab="channelNature" style="display:none;">
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-layers"></i>
                                <input type="text" class="bc-input" id="searchChannelNatureName" placeholder="搜索性质名称或编码...">
                            </div>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchChannelNatureLevel1">
                                <option value="">所有渠道性质</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchChannelNatureLevel2">
                                <option value="">所有经营类型</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchChannelNatureStatus">
                                <option value="">全部状态</option>
                                <option value="1">正常</option>
                                <option value="0">停用</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn bc-btn-primary" id="searchChannelNatureBtn">
                                <i class="bi bi-search"></i> 查询
                            </button>
                            <button type="button" class="btn bc-btn-secondary" id="resetChannelNatureBtn">
                                <i class="bi bi-arrow-counterclockwise"></i> 重置
                            </button>
                        </div>
                        <div class="col-auto ms-auto" th:if="${#lists.contains(permissions, '*') or #lists.contains(permissions, 'bi:channelNature:add')}">
                            <button type="button" class="btn bc-btn-success" id="addChannelNatureBtn">
                                <i class="bi bi-plus-lg"></i> 新增性质
                            </button>
                        </div>
                    </form>

                    <!-- ==================== 品牌管理 内容区域 ==================== -->
                    <div id="content_brand" class="tab-content-area">
                        <div class="bc-table-container">
                            <table class="bc-table bc-table-hover" id="brandTable">
                                <thead>
                                    <tr>
                                        <th style="width: 80px;">序号</th>
                                        <th style="width: 100px;">LOGO</th>
                                        <th>品牌名称</th>
                                        <th>品牌描述</th>
                                        <th style="width: 80px;">排序</th>
                                        <th style="width: 100px;">状态</th>
                                        <th style="width: 120px;" class="text-end">管理操作</th>
                                    </tr>
                                </thead>
                                <tbody id="brandDataTableBody"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- ==================== 地区管理 内容区域 ==================== -->
                    <div id="content_region" class="tab-content-area" style="display:none;">
                        <div class="bc-table-container" id="regionTreeContainer"></div>
                    </div>

                    <!-- ==================== 渠道类型 内容区域 ==================== -->
                    <div id="content_channelType" class="tab-content-area" style="display:none;">
                        <div class="bc-table-container" id="channelTypeTreeContainer"></div>
                    </div>

                    <!-- ==================== 渠道性质 内容区域 ==================== -->
                    <div id="content_channelNature" class="tab-content-area" style="display:none;">
                        <div class="bc-table-container" id="channelNatureTreeContainer"></div>
                    </div>

                </div>
            </div>

            <div th:replace="~{common/fragments :: pagination}"></div>
        </div>

        <div th:replace="~{common/fragments :: footer}"></div>
    </div>

    <!-- ==================== 品牌管理 弹窗 ==================== -->
    <div class="modal fade" id="brandModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bc-modal-content">
                <div class="modal-header bc-modal-header">
                    <h5 class="modal-title bc-modal-title">
                        <i class="bi bi-tags"></i> <span id="brandModalTitle">新增品牌</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body bc-modal-body">
                    <form id="brandForm">
                        <input type="hidden" id="brandId">
                        <div class="bc-form-grid">
                            <div class="bc-form-group">
                                <label class="bc-form-label">品牌名称 <span class="text-danger">*</span></label>
                                <input type="text" class="bc-input" id="brandName" placeholder="示例：Nike" required>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">品牌LOGO URL</label>
                                <input type="text" class="bc-input" id="brandLogo" placeholder="https://...">
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">状态</label>
                                <select class="bc-select" id="brandStatus">
                                    <option value="1">启用</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">排序</label>
                                <input type="number" class="bc-input" id="brandSort" value="0">
                            </div>
                            <div class="bc-form-group bc-form-group-full">
                                <label class="bc-form-label">品牌描述</label>
                                <textarea class="bc-textarea" id="brandDescription" rows="3" placeholder="请输入品牌背景及职能描述"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bc-modal-footer">
                    <button type="button" class="btn bc-btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn bc-btn-primary" id="saveBrandBtn">保存信息</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 地区管理 弹窗 ==================== -->
    <div class="modal fade" id="regionModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bc-modal-content">
                <div class="modal-header bc-modal-header">
                    <h5 class="modal-title bc-modal-title">
                        <i class="bi bi-geo-alt"></i> <span id="regionModalTitle">新增区域</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bc-modal-body">
                    <form id="regionForm">
                        <input type="hidden" id="regionId">
                        <div class="bc-form-grid">
                            <div class="bc-form-group bc-form-group-full">
                                <label class="bc-form-label">上级区域</label>
                                <select class="bc-select" id="regionParentId">
                                    <option value="0">无（顶级区域）</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">区域名称 <span class="text-danger">*</span></label>
                                <input type="text" class="bc-input" id="regionName" placeholder="如：广东省" required>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">行政编码</label>
                                <input type="text" class="bc-input" id="regionCode" placeholder="如：440000">
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">区域级别</label>
                                <select class="bc-select" id="regionType">
                                    <option value="1">一级地区</option>
                                    <option value="2">二级地区</option>
                                    <option value="3">三级地区</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">显示排序</label>
                                <input type="number" class="bc-input" id="regionSort" value="0">
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">状态</label>
                                <select class="bc-select" id="regionStatus">
                                    <option value="1">启用</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                            <div class="bc-form-group-full">
                                <label class="bc-form-label">备注</label>
                                <textarea class="bc-textarea" id="regionRemark" rows="2" placeholder="补充说明信息..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bc-modal-footer">
                    <button type="button" class="btn bc-btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn bc-btn-primary" id="saveRegionBtn">保存区域</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 渠道类型 弹窗 ==================== -->
    <div class="modal fade" id="channelTypeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bc-modal-content">
                <div class="modal-header bc-modal-header">
                    <h5 class="modal-title bc-modal-title">
                        <i class="bi bi-diagram-3"></i> <span id="channelTypeModalTitle">新增渠道类型</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bc-modal-body">
                    <form id="channelTypeForm">
                        <input type="hidden" id="channelTypeId">
                        <div class="bc-form-grid">
                            <div class="bc-form-group bc-form-group-full">
                                <label class="bc-form-label">上级类型</label>
                                <select class="bc-select" id="channelTypeParentId">
                                    <option value="0">无（顶级类型）</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">类型名称 <span class="text-danger">*</span></label>
                                <input type="text" class="bc-input" id="typeName" placeholder="如：线上渠道" required>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">类型编码</label>
                                <input type="text" class="bc-input" id="typeCode" placeholder="如：ONLINE">
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">级别</label>
                                <select class="bc-select" id="typeLevel" disabled>
                                    <option value="1">渠道类型 (一级)</option>
                                    <option value="2">渠道定义 (二级)</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">显示排序</label>
                                <input type="number" class="bc-input" id="channelTypeSort" value="0">
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">状态</label>
                                <select class="bc-select" id="channelTypeStatus">
                                    <option value="1">启用</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                            <div class="bc-form-group-full">
                                <label class="bc-form-label">备注</label>
                                <textarea class="bc-textarea" id="channelTypeRemark" rows="2" placeholder="补充说明信息..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bc-modal-footer">
                    <button type="button" class="btn bc-btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn bc-btn-primary" id="saveChannelTypeBtn">保存类型</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 渠道性质 弹窗 ==================== -->
    <div class="modal fade" id="channelNatureModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bc-modal-content">
                <div class="modal-header bc-modal-header">
                    <h5 class="modal-title bc-modal-title">
                        <i class="bi bi-layers"></i> <span id="channelNatureModalTitle">新增渠道性质</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bc-modal-body">
                    <form id="channelNatureForm">
                        <input type="hidden" id="channelNatureId">
                        <div class="bc-form-grid">
                            <div class="bc-form-group bc-form-group-full">
                                <label class="bc-form-label">上级性质</label>
                                <select class="bc-select" id="channelNatureParentId">
                                    <option value="0">无（顶级性质）</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">性质名称 <span class="text-danger">*</span></label>
                                <input type="text" class="bc-input" id="natureName" placeholder="如：直营" required>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">性质编码</label>
                                <input type="text" class="bc-input" id="natureCode" placeholder="如：DIRECT">
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">级别</label>
                                <select class="bc-select" id="natureLevel" disabled>
                                    <option value="1">渠道性质 (一级)</option>
                                    <option value="2">经营类型 (二级)</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">显示排序</label>
                                <input type="number" class="bc-input" id="channelNatureSort" value="0">
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">状态</label>
                                <select class="bc-select" id="channelNatureStatus">
                                    <option value="1">启用</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                            <div class="bc-form-group-full">
                                <label class="bc-form-label">备注</label>
                                <textarea class="bc-textarea" id="channelNatureRemark" rows="2" placeholder="补充说明信息..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bc-modal-footer">
                    <button type="button" class="btn bc-btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn bc-btn-primary" id="saveChannelNatureBtn">保存性质</button>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{common/fragments :: confirm-modal}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script th:inline="javascript">
        window.userPermissions = /*[[${permissions}]]*/ [];

    </script>
    <script src="/js/common.js"></script>

    <script>
    (function() {
        // ==================== Tab状态管理 ====================
        var currentTab = 'brand';
        var pageSize = 10;
        var tabPage = { brand: 1, region: 1, channelType: 1, channelNature: 1 };
        var tabSearch = {
            brand:         { brandName: '', status: '' },
            region:        { name: '', level1: '', level2: '', status: '' },
            channelType:   { name: '', level1: '', level2: '', status: '' },
            channelNature: { name: '', level1: '', level2: '', status: '' }
        };
        var tabInitialized = { brand: true, region: false, channelType: false, channelNature: false };

        // ==================== Tab切换 ====================
        function switchTab(tab) {
            if (tab === currentTab) return;
            saveSearchState();

            $('.tab-search-form').hide();
            $('.tab-content-area').hide();

            currentTab = tab;
            $('#mainTabs .nav-link').removeClass('active');
            $('[data-tab="' + tab + '"]').addClass('active');

            $('#searchForm_' + tab).show();
            $('#content_' + tab).show();

            if (!tabInitialized[tab]) {
                initTabDropdowns(tab);
                tabInitialized[tab] = true;
            }

            restoreSearchState(tab);
        }

        function saveSearchState() {
            switch (currentTab) {
                case 'brand':
                    tabSearch.brand = {
                        brandName: $('#searchBrandName').val(),
                        status: $('#searchBrandStatus').val()
                    };
                    break;
                case 'region':
                    tabSearch.region = {
                        name: $('#searchRegionName').val(),
                        level1: $('#searchRegionLevel1').val(),
                        level2: $('#searchRegionLevel2').val(),
                        status: $('#searchRegionStatus').val()
                    };
                    break;
                case 'channelType':
                    tabSearch.channelType = {
                        name: $('#searchChannelTypeName').val(),
                        level1: $('#searchChannelTypeLevel1').val(),
                        level2: $('#searchChannelTypeLevel2').val(),
                        status: $('#searchChannelTypeStatus').val()
                    };
                    break;
                case 'channelNature':
                    tabSearch.channelNature = {
                        name: $('#searchChannelNatureName').val(),
                        level1: $('#searchChannelNatureLevel1').val(),
                        level2: $('#searchChannelNatureLevel2').val(),
                        status: $('#searchChannelNatureStatus').val()
                    };
                    break;
            }
        }

        function openRegionModal(id, onReady) {
            $('#regionForm')[0].reset();
            $('#regionId').val('');
            if (!onReady) $('#regionModalTitle').text(id ? '编辑区域' : '新增区域');

            BC.ajax({
                url: '/api/region/tree',
                type: 'GET',
                success: function(res) {
                    var select = $('#regionParentId');
                    select.empty().append('<option value="0">无（顶级区域）</option>');

                    function addOptions(nodes, level) {
                        nodes.forEach(function(node) {
                            if (node.id !== id) {
                                var prefix = '　'.repeat(level);
                                select.append('<option value="' + BC.escapeHtml(node.id) + '">' + prefix + BC.escapeHtml(node.regionName) + '</option>');
                                if (node.children) addOptions(node.children, level + 1);
                            }
                        });
                    }
                    addOptions(res, 0);

                    function done() {
                        if (onReady) onReady();
                        BC.showModal('#regionModal');
                    }

                    if (id) {
                        BC.ajax({
                            url: '/api/region/' + id,
                            type: 'GET',
                            success: function(res) {
                                var d = res;
                                $('#regionId').val(d.id);
                                $('#regionParentId').val(d.parentId);
                                $('#regionName').val(d.regionName);
                                $('#regionCode').val(d.regionCode);
                                $('#regionType').val(d.regionType);
                                $('#regionSort').val(d.sort);
                                $('#regionStatus').val(d.status);
                                $('#regionRemark').val(d.remark);
                                done();
                            }
                        });
                    } else {
                        done();
                    }
                }
            });
        }

                success: function(res) {
                    var select = $('#channelTypeParentId');
                    select.empty().append('<option value="0">无（顶级类型）</option>');

                    function addOptions(nodes, level) {
                        nodes.forEach(function(node) {
                            if (node.id !== id) {
                                var prefix = '　'.repeat(level);
                                select.append('<option value="' + BC.escapeHtml(node.id) + '">' + prefix + BC.escapeHtml(node.typeName) + '</option>');
                                if (node.children) addOptions(node.children, level + 1);
                            }
                        });
                    }
                    addOptions(res, 0);

                    function done() {
                        if (onReady) onReady();
                        BC.showModal('#channelTypeModal');
                    }

                    if (id) {
                        BC.ajax({
                            url: '/api/channel-type/' + id,
                            type: 'GET',
                            success: function(res) {
                                var d = res;
                                $('#channelTypeId').val(d.id);
                                $('#channelTypeParentId').val(d.parentId);
                                $('#typeLevel').val(d.parentId === '0' ? '1' : '2');
                                $('#typeName').val(d.typeName);
                                $('#typeCode').val(d.typeCode);
                                $('#channelTypeSort').val(d.sort);
                                $('#channelTypeStatus').val(d.status);
                                $('#channelTypeRemark').val(d.remark);
                                done();
                            }
                        });
                    } else {
                        done();
                    }
                }
            });
        }

        function saveChannelType() {
            var id = $('#channelTypeId').val();
            var data = {
                parentId: $('#channelTypeParentId').val(),
                typeName: $('#typeName').val(),
                typeCode: $('#typeCode').val(),
                sort: $('#channelTypeSort').val(),
                status: $('#channelTypeStatus').val(),
                remark: $('#channelTypeRemark').val()
            };

            if (!data.typeName) {
                BC.toast('请输入类型名称', 'warning');
                return;
            }

            var type = id ? 'PUT' : 'POST';
            var url = '/api/channel-type' + (id ? '/' + id : '');

            BC.ajax({
                url: url,
                type: type,
                data: data,
                success: function(res) {
                    BC.hideModal('#channelTypeModal');
                    BC.toast(res.message, 'success');
                    loadChannelTypeData();
                }
            });
        }

        function deleteChannelType(id) {
            BC.confirm({
                title: '删除渠道类型',
                message: '确定要移除该渠道类型吗？如果该类型下存在子级，子级也将被一并移除！',
                type: 'danger'
            }, function(confirmed) {
                if (confirmed) {
                    BC.ajax({
                        url: '/api/channel-type/' + id,
                        type: 'DELETE',
                        success: function(res) {
                            BC.toast(res.message, 'success');
                            loadChannelTypeData();
                        }
                    });
                }
            });
        }

        // ==================== 渠道性质 ====================
        function loadChannelNatureDropdowns() {
            BC.ajax({
                url: '/api/channel-nature/tree?parentId=0',
                type: 'GET',
                success: function(res) {
                    var html = '<option value="">所有渠道性质</option>';
                    res.forEach(function(item) {
                        html += '<option value="' + BC.escapeHtml(item.id) + '">' + BC.escapeHtml(item.natureName) + '</option>';
                    });
                    $('#searchChannelNatureLevel1').html(html);
                }
            });
        }

        function loadChannelNatureSearchLevel2(parentId, callback) {
            var select2 = $('#searchChannelNatureLevel2');
            if (!parentId) {
                select2.html('<option value="">所有经营类型</option>');
                if (callback) callback();
                return;
            }
            BC.ajax({
                url: '/api/channel-nature/tree?parentId=' + parentId,
                type: 'GET',
                success: function(res) {
                    var html = '<option value="">所有经营类型</option>';
                    res.forEach(function(item) {
                        html += '<option value="' + BC.escapeHtml(item.id) + '">' + BC.escapeHtml(item.natureName) + '</option>';
                    });
                    select2.html(html);
                    if (callback) callback();
                }
            });
        }

        function loadChannelNatureData(page) {
            if (page) tabPage.channelNature = page;
            var params = {
                natureName: $('#searchChannelNatureName').val(),
                status: $('#searchChannelNatureStatus').val(),
                level1Id: $('#searchChannelNatureLevel1').val(),
                level2Id: $('#searchChannelNatureLevel2').val(),
                pageNum: tabPage.channelNature,
                pageSize: pageSize
            };

            BC.ajax({
                url: '/api/channel-nature/page',
                type: 'GET',
                data: params,
                success: function(res) {
                    renderChannelNatureTable(res.records);
                    renderChannelNaturePagination(res);
                }
            });
        }

        function renderChannelNaturePagination(data) {
            BC.renderPagination({
                total: data.total,
                pages: data.pages,
                current: data.pageNum,
                callback: function(p) { loadChannelNatureData(p); }
            });
        }

        function makeNatureTag(item) {
            return item.parentId === '0' ? BC.getTag('info', '渠道性质') : BC.getTag('success', '经营类型');
        }

        function makeNatureActions(item) {
            var btn = [];
            if (BC.hasPermission('bi:channelNature:add') && item.parentId === '0') {
                btn.push({ icon: 'bi-plus-lg', title: '添加下级', onclick: "addChannelNatureSub('" + item.id + "', " + JSON.stringify(item.natureName || '') + ")" });
            }
            if (BC.hasPermission('bi:channelNature:edit')) {
                btn.push({ icon: 'bi-pencil', title: '编辑', onclick: "openChannelNatureModal('" + item.id + "')" });
            }
            if (BC.hasPermission('bi:channelNature:delete')) {
                btn.push({ icon: 'bi-trash', title: '删除', onclick: "deleteChannelNature('" + item.id + "')" });
            }
            return '<div class="bc-collapse-actions">' + BC.getTableActions(btn) + '</div>';
        }

        var _cnatureUid = 0;

        function renderChannelNatureTable(data) {
            var container = $('#channelNatureTreeContainer');
            container.empty();
            _cnatureUid = 0;

            if (!data || data.length === 0) {
                container.html('<div class="text-center py-5"><i class="bi bi-layers" style="font-size:2rem;color:#cbd5e1;"></i><p class="text-muted mt-2 mb-0">暂无渠道性质数据</p></div>');
                return;
            }

            data.forEach(function(item) {
                container.append(buildNatureCard(item));
            });

            container.off('click', '.bc-collapse-header').on('click', '.bc-collapse-header', function(e) {
                if ($(e.target).closest('.bc-collapse-actions').length) return;
                var $hdr = $(this);
                var target = $hdr.data('target');
                var $body = $('#' + target);
                if (!$body.data('loaded')) {
                    var parentId = $hdr.data('parent-id');
                    loadSubNatures(parentId, target);
                }
                $body.toggleClass('open');
                $hdr.find('.bc-collapse-arrow').toggleClass('open');
                $hdr.toggleClass('expanded');
            });
        }

        function buildNatureCard(item) {
            var typeTag = makeNatureTag(item);
            var statusTag = BC.getTag(item.status === 1 ? 'success' : 'danger', item.status === 1 ? '启用' : '禁用');
            var hasChildren = item.hasChildren;
            var uid = 'cnature-' + (_cnatureUid++);

            if (hasChildren) {
                var h = '<div class="bc-collapse-card">';
                h += '<div class="bc-collapse-header" data-target="' + uid + '" data-parent-id="' + item.id + '">';
                h +=   '<div class="bc-collapse-title">';
                h +=     '<i class="bi bi-chevron-right bc-collapse-arrow"></i>';
                h +=     '<i class="bi bi-layers"></i>';
                h +=     '<span>' + BC.escapeHtml(item.natureName || '') + '</span>';
                h +=     typeTag + statusTag;
                h +=   '</div>';
                h +=   '<div class="bc-collapse-meta">';
                if (item.natureCode) h += '<code>' + BC.escapeHtml(item.natureCode) + '</code>';
                if (item.sort) h += '<span>排序 ' + item.sort + '</span>';
                h +=   '</div>';
                h +=   makeNatureActions(item);
                h += '</div>';
                h += '<div class="bc-collapse-body" id="' + uid + '"></div>';
                h += '</div>';
                return h;
            }

            var h = '<div class="bc-collapse-item">';
            h +=   '<div class="bc-collapse-item-info">';
            h +=     '<span class="bc-collapse-item-dot"></span>';
            h +=     '<i class="bi bi-layers" style="color:var(--text-muted);"></i>';
            h +=     '<span>' + BC.escapeHtml(item.natureName || '') + '</span>';
            h +=     typeTag + statusTag;
            h +=   '</div>';
            h +=   '<div class="bc-collapse-item-detail">';
            if (item.natureCode) h += '<code>' + BC.escapeHtml(item.natureCode) + '</code>';
            if (item.sort) h += '<span>排序 ' + item.sort + '</span>';
            h +=   '</div>';
            h +=   makeNatureActions(item);
            h += '</div>';
            return h;
        }

        function loadSubNatures(parentId, bodyId) {
            var $body = $('#' + bodyId);
            BC.ajax({
                url: '/api/channel-nature/tree',
                type: 'GET',
                data: { parentId: parentId },
                success: function(res) {
                    $body.data('loaded', true);
                    if (res.length > 0) {
                        res.forEach(function(child) {
                            $body.append(buildNatureCard(child));
                        });
                    } else {
                        $body.append('<div class="bc-collapse-empty"><i class="bi bi-inbox me-1"></i>暂无下级性质</div>');
                    }
                }
            });
        }

        function addChannelNatureSub(parentId, parentName) {
            openChannelNatureModal(null, function() {
                $('#channelNatureModalTitle').text('新增下级性质 - ' + parentName);
                $('#channelNatureParentId').val(parentId);
                $('#natureLevel').val('2');
                $('#natureName').val('经营类型');
            });
        }

        function openChannelNatureModal(id, onReady) {
            $('#channelNatureForm')[0].reset();
            $('#channelNatureId').val('');
            if (!onReady) $('#channelNatureModalTitle').text(id ? '编辑渠道性质' : '新增渠道性质');

            if (!id) {
                $('#natureName').val('渠道性质');
                $('#natureLevel').val('1');
            }

            BC.ajax({
                url: '/api/channel-nature/tree',
                type: 'GET',
                success: function(res) {
                    var select = $('#channelNatureParentId');
                    select.empty().append('<option value="0">无（顶级性质）</option>');

                    function addOptions(nodes, level) {
                        nodes.forEach(function(node) {
                            if (node.id !== id) {
                                var prefix = '　'.repeat(level);
                                select.append('<option value="' + BC.escapeHtml(node.id) + '">' + prefix + BC.escapeHtml(node.natureName) + '</option>');
                                if (node.children) addOptions(node.children, level + 1);
                            }
                        });
                    }
                    addOptions(res, 0);

                    function done() {
                        if (onReady) onReady();
                        BC.showModal('#channelNatureModal');
                    }

                    if (id) {
                        BC.ajax({
                            url: '/api/channel-nature/' + id,
                            type: 'GET',
                            success: function(res) {
                                var d = res;
                                $('#channelNatureId').val(d.id);
                                $('#channelNatureParentId').val(d.parentId);
                                $('#natureLevel').val(d.parentId === '0' ? '1' : '2');
                                $('#natureName').val(d.natureName);
                                $('#natureCode').val(d.natureCode);
                                $('#channelNatureSort').val(d.sort);
                                $('#channelNatureStatus').val(d.status);
                                $('#channelNatureRemark').val(d.remark);
                                done();
                            }
                        });
                    } else {
                        done();
                    }
                }
            });
        }

        function saveChannelNature() {
            var id = $('#channelNatureId').val();
            var data = {
                parentId: $('#channelNatureParentId').val(),
                natureName: $('#natureName').val(),
                natureCode: $('#natureCode').val(),
                sort: $('#channelNatureSort').val(),
                status: $('#channelNatureStatus').val(),
                remark: $('#channelNatureRemark').val()
            };

            if (!data.natureName) {
                BC.toast('请输入性质名称', 'warning');
                return;
            }

            var type = id ? 'PUT' : 'POST';
            var url = '/api/channel-nature' + (id ? '/' + id : '');

            BC.ajax({
                url: url,
                type: type,
                data: data,
                success: function(res) {
                    BC.hideModal('#channelNatureModal');
                    BC.toast(res.message, 'success');
                    loadChannelNatureData();
                }
            });
        }

        function deleteChannelNature(id) {
            BC.confirm({
                title: '删除渠道性质',
                message: '确定要移除该渠道性质吗？如果该性质下存在子级，子级也将被一并移除！',
                type: 'danger'
            }, function(confirmed) {
                if (confirmed) {
                    BC.ajax({
                        url: '/api/channel-nature/' + id,
                        type: 'DELETE',
                        success: function(res) {
                            BC.toast(res.message, 'success');
                            loadChannelNatureData();
                        }
                    });
                }
            });
        }

        // ==================== 全局函数（供onclick调用）====================
        window.openBrandModal = openBrandModal;
        window.deleteBrand = deleteBrand;
        window.addRegionSub = addRegionSub;
        window.openRegionModal = openRegionModal;
        window.deleteRegion = deleteRegion;
        window.addChannelTypeSub = addChannelTypeSub;
        window.openChannelTypeModal = openChannelTypeModal;
        window.deleteChannelType = deleteChannelType;
        window.addChannelNatureSub = addChannelNatureSub;
        window.openChannelNatureModal = openChannelNatureModal;
        window.deleteChannelNature = deleteChannelNature;

        // ==================== 初始化 ====================
        $(document).ready(function() {
            // URL参数支持初始Tab
            var validTabs = ['brand', 'region', 'channelType', 'channelNature'];
            var urlParams = new URLSearchParams(window.location.search);
            var initialTab = urlParams.get('tab') || 'brand';
            if (validTabs.indexOf(initialTab) === -1) initialTab = 'brand';

            // Tab点击
            $('#mainTabs .nav-link').click(function(e) {
                e.preventDefault();
                switchTab($(this).data('tab'));
            });

            // 品牌按钮绑定
            $('#searchBrandBtn').click(function() { tabPage.brand = 1; loadBrandData(); });
            $('#resetBrandBtn').click(function() {
                $('#searchForm_brand')[0].reset();
                tabSearch.brand = { brandName: '', status: '' };
                tabPage.brand = 1;
                loadBrandData();
            });
            $('#addBrandBtn').click(function() { openBrandModal('add'); });
            $('#saveBrandBtn').click(function() { saveBrand(); });

            // 地区按钮绑定
            $('#searchRegionBtn').click(function() { tabPage.region = 1; loadRegionData(); });
            $('#resetRegionBtn').click(function() {
                $('#searchForm_region')[0].reset();
                $('#searchRegionLevel2').html('<option value="">全部二级地区</option>');
                tabSearch.region = { name: '', level1: '', level2: '', status: '' };
                tabPage.region = 1;
                loadRegionData();
            });
            $('#addRegionBtn').click(function() { openRegionModal(); });
            $('#saveRegionBtn').click(function() { saveRegion(); });
            $('#searchRegionLevel1').change(function() { loadRegionSearchLevel2($(this).val()); });
            $('#regionParentId').change(function() {
                $('#regionType').val($(this).val() === '0' ? '1' : '2');
            });

            // 渠道类型按钮绑定
            $('#searchChannelTypeBtn').click(function() { tabPage.channelType = 1; loadChannelTypeData(); });
            $('#resetChannelTypeBtn').click(function() {
                $('#searchForm_channelType')[0].reset();
                $('#searchChannelTypeLevel2').html('<option value="">所有渠道定义</option>');
                tabSearch.channelType = { name: '', level1: '', level2: '', status: '' };
                tabPage.channelType = 1;
                loadChannelTypeData();
            });
            $('#addChannelTypeBtn').click(function() { openChannelTypeModal(); });
            $('#saveChannelTypeBtn').click(function() { saveChannelType(); });
            $('#searchChannelTypeLevel1').change(function() { loadChannelTypeSearchLevel2($(this).val()); });
            $('#channelTypeParentId').change(function() {
                $('#typeLevel').val($(this).val() === '0' ? '1' : '2');
            });

            // 渠道性质按钮绑定
            $('#searchChannelNatureBtn').click(function() { tabPage.channelNature = 1; loadChannelNatureData(); });
            $('#resetChannelNatureBtn').click(function() {
                $('#searchForm_channelNature')[0].reset();
                $('#searchChannelNatureLevel2').html('<option value="">所有经营类型</option>');
                tabSearch.channelNature = { name: '', level1: '', level2: '', status: '' };
                tabPage.channelNature = 1;
                loadChannelNatureData();
            });
            $('#addChannelNatureBtn').click(function() { openChannelNatureModal(); });
            $('#saveChannelNatureBtn').click(function() { saveChannelNature(); });
            $('#searchChannelNatureLevel1').change(function() { loadChannelNatureSearchLevel2($(this).val()); });
            $('#channelNatureParentId').change(function() {
                $('#natureLevel').val($(this).val() === '0' ? '1' : '2');
            });

            // 加载初始Tab数据
            if (initialTab === 'brand') {
                loadBrandData();
            } else {
                switchTab(initialTab);
            }
        });

    })();
    </script>
</body>
</html>
