<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渠道类型管理 - BC体育后台中心</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 自定义CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>
    <!-- 侧边栏 -->
    <div th:replace="~{common/fragments :: sidebar}"></div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 顶部导航 -->
        <nav th:replace="~{common/fragments :: top-navbar}"></nav>

        <!-- 内容区域 -->
        <div class="content-wrapper">
            <div class="bc-card">
                <div class="bc-card-body">
                    <!-- 搜索与操作栏 -->
                    <form class="row g-3 bc-toolbar align-items-center" id="searchForm">
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-diagram-3"></i>
                                <input type="text" class="bc-input" id="searchName" placeholder="搜索类型名称或编码...">
                            </div>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchLevel1">
                                <option value="">所有渠道类型</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchLevel2">
                                <option value="">所有渠道定义</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchStatus">
                                <option value="">全部状态</option>
                                <option value="1">正常</option>
                                <option value="0">停用</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn bc-btn-primary" onclick="loadChannelTypeData()">
                                <i class="bi bi-search"></i> 查询
                            </button>
                            <button type="button" class="btn bc-btn-secondary" onclick="resetSearch()">
                                <i class="bi bi-arrow-counterclockwise"></i> 重置
                            </button>
                        </div>
                        <div class="col-auto ms-auto"
                            th:if="${#lists.contains(permissions, '*') or #lists.contains(permissions, 'bi:channelType:add')}">
                            <button type="button" class="btn bc-btn-success" id="addBtn">
                                <i class="bi bi-plus-lg"></i> 新增类型
                            </button>
                        </div>
                    </form>

                    <div class="bc-table-container" id="channelTypeTreeContainer">
                        <!-- 折叠面板动态加载 -->
                    </div>

                </div>
            </div>

            <!-- 分页组件 -->
            <div th:replace="~{common/fragments :: pagination}"></div>

        </div>

        <div th:replace="~{common/fragments :: footer}"></div>
    </div>

    <!-- 添加/编辑模态框 -->
    <div class="modal fade" id="channelTypeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bc-modal-content">
                <div class="modal-header bc-modal-header">
                    <h5 class="modal-title bc-modal-title">
                        <i class="bi bi-diagram-3"></i> <span id="modalTitle">新增渠道类型</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bc-modal-body">
                    <form id="channelTypeForm">
                        <input type="hidden" id="channelTypeId">
                        <div class="bc-form-grid">
                            <div class="bc-form-group bc-form-group-full">
                                <label class="bc-form-label">上级类型</label>
                                <select class="bc-select" id="parentId">
                                    <option value="0">无（顶级类型）</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">类型名称 <span class="text-danger">*</span></label>
                                <input type="text" class="bc-input" id="typeName" placeholder="如：线上渠道" required>
                            </div>
                             <div class="bc-form-group">
                                <label class="bc-form-label">类型编码</label>
                                <input type="text" class="bc-input" id="typeCode" placeholder="如：ONLINE">
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">级别</label>
                                <select class="bc-select" id="typeLevel" disabled>
                                    <option value="1">渠道类型 (一级)</option>
                                    <option value="2">渠道定义 (二级)</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">显示排序</label>
                                <input type="number" class="bc-input" id="sort" value="0">
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">状态</label>
                                <select class="bc-select" id="status">
                                    <option value="1">启用</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                            <div class="bc-form-group-full">
                                <label class="bc-form-label">备注</label>
                                <textarea class="bc-textarea" id="remark" rows="2" placeholder="补充说明信息..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bc-modal-footer">
                    <button type="button" class="btn bc-btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn bc-btn-primary" id="saveBtn">保存类型</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 通用确认弹窗 -->
    <div th:replace="~{common/fragments :: confirm-modal}"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script th:inline="javascript">
        // 将后端注入的权限列表同步到前端 JS 作用域
        window.userPermissions = /*[[${permissions}]]*/[];

    </script>
    <script src="/js/common.js"></script>
    <script>
        var currentPage = 1;
        var pageSize = 10;

        $(document).ready(function () {
            loadSearchDropdowns();
            loadChannelTypeData();

            $('#addBtn').click(function () {
                openModal();
            });

            $('#saveBtn').click(function () {
                saveChannelType();
            });

            // 联动逻辑
            $('#searchLevel1').change(function () {
                loadSearchLevel2($(this).val());
            });

            // 模态框上级选择联动级别
            $('#parentId').change(function () {
                var parentId = $(this).val();
                $('#typeLevel').val(parentId === '0' ? '1' : '2');
            });
        });

        function loadSearchDropdowns() {
            BC.ajax({
                url: '/api/channel-type/tree?parentId=0',
                type: 'GET',
                success: function (res) {
                    var html = '<option value="">所有渠道类型</option>';
                    res.forEach(item => {
                        html += `<option value="${BC.escapeHtml(item.id)}">${BC.escapeHtml(item.typeName)}</option>`;
                    });
                    $('#searchLevel1').html(html);
                }
            });
        }

        function loadSearchLevel2(parentId) {
            var select2 = $('#searchLevel2');
            if (!parentId) {
                select2.html('<option value="">所有渠道定义</option>');
                return;
            }
            BC.ajax({
                url: '/api/channel-type/tree?parentId=' + parentId,
                type: 'GET',
                success: function (res) {
                    var html = '<option value="">所有渠道定义</option>';
                    res.forEach(item => {
                        html += `<option value="${BC.escapeHtml(item.id)}">${BC.escapeHtml(item.typeName)}</option>`;
                    });
                    select2.html(html);
                }
            });
        }

        function loadChannelTypeData(page) {
            if (page) currentPage = page;
            var params = {
                typeName: $('#searchName').val(),
                status: $('#searchStatus').val(),
                level1Id: $('#searchLevel1').val(),
                level2Id: $('#searchLevel2').val(),
                pageNum: currentPage,
                pageSize: pageSize
            };

            BC.ajax({
                url: '/api/channel-type/page',
                type: 'GET',
                data: params,
                success: function (res) {
                    renderTable(res.records);
                    renderPagination(res);
                }
            });
        }

        function renderPagination(data) {
            BC.renderPagination({
                total: data.total,
                pages: data.pages,
                current: data.pageNum,
                callback: function (p) {
                    loadChannelTypeData(p);
                }
            });
        }

        function makeTypeTag(item) {
            return item.parentId === '0' ? BC.getTag('info', '渠道类型') : BC.getTag('success', '渠道定义');
        }
        function makeTypeActions(item) {
            var btn = [];
            if (BC.hasPermission('bi:channelType:add') && item.parentId === '0') {
                btn.push({ icon: 'bi-plus-lg', title: '添加下级', onclick: 'addChannelTypeSub(\'' + item.id + '\', ' + JSON.stringify(item.typeName || '') + ')' });
            }
            if (BC.hasPermission('bi:channelType:edit')) {
                btn.push({ icon: 'bi-pencil', title: '编辑', onclick: 'openModal(\'' + item.id + '\')' });
            }
            if (BC.hasPermission('bi:channelType:delete')) {
                btn.push({ icon: 'bi-trash', title: '删除', onclick: 'deleteChannelType(\'' + item.id + '\')' });
            }
            return '<div class="bc-collapse-actions">' + BC.getTableActions(btn) + '</div>';
        }
        var _ctypeUid = 0;

        function renderTable(data) {
            var container = $('#channelTypeTreeContainer');
            container.empty();
            _ctypeUid = 0;

            if (!data || data.length === 0) {
                container.html('<div class="text-center py-5"><i class="bi bi-diagram-3" style="font-size:2rem;color:#cbd5e1;"></i><p class="text-muted mt-2 mb-0">暂无渠道类型数据</p></div>');
                return;
            }

            data.forEach(function(item) {
                container.append(buildTypeCard(item));
            });

            container.off('click', '.bc-collapse-header').on('click', '.bc-collapse-header', function(e) {
                if ($(e.target).closest('.bc-collapse-actions').length) return;
                var $hdr = $(this);
                var target = $hdr.data('target');
                var $body = $('#' + target);
                if (!$body.data('loaded')) {
                    var parentId = $hdr.data('parent-id');
                    loadSubTypes(parentId, target);
                }
                $body.toggleClass('open');
                $hdr.find('.bc-collapse-arrow').toggleClass('open');
                $hdr.toggleClass('expanded');
            });
        }

        function buildTypeCard(item) {
            var typeTag = makeTypeTag(item);
            var statusTag = BC.getTag(item.status === 1 ? 'success' : 'danger', item.status === 1 ? '启用' : '禁用');
            var hasChildren = item.hasChildren;
            var uid = 'ctype-' + (_ctypeUid++);

            if (hasChildren) {
                var h = '<div class="bc-collapse-card">';
                h += '<div class="bc-collapse-header" data-target="' + uid + '" data-parent-id="' + item.id + '">';
                h +=   '<div class="bc-collapse-title">';
                h +=     '<i class="bi bi-chevron-right bc-collapse-arrow"></i>';
                h +=     '<i class="bi bi-diagram-3"></i>';
                h +=     '<span>' + BC.escapeHtml(item.typeName || '') + '</span>';
                h +=     typeTag + statusTag;
                h +=   '</div>';
                h +=   '<div class="bc-collapse-meta">';
                if (item.typeCode) h += '<code>' + BC.escapeHtml(item.typeCode) + '</code>';
                if (item.sort) h += '<span>排序 ' + item.sort + '</span>';
                h +=   '</div>';
                h +=   makeTypeActions(item);
                h += '</div>';
                h += '<div class="bc-collapse-body" id="' + uid + '"></div>';
                h += '</div>';
                return h;
            }

            var h = '<div class="bc-collapse-item">';
            h +=   '<div class="bc-collapse-item-info">';
            h +=     '<span class="bc-collapse-item-dot"></span>';
            h +=     '<i class="bi bi-diagram-3" style="color:var(--text-muted);"></i>';
            h +=     '<span>' + BC.escapeHtml(item.typeName || '') + '</span>';
            h +=     typeTag + statusTag;
            h +=   '</div>';
            h +=   '<div class="bc-collapse-item-detail">';
            if (item.typeCode) h += '<code>' + BC.escapeHtml(item.typeCode) + '</code>';
            if (item.sort) h += '<span>排序 ' + item.sort + '</span>';
            h +=   '</div>';
            h +=   makeTypeActions(item);
            h += '</div>';
            return h;
        }

        function loadSubTypes(parentId, bodyId) {
            var $body = $('#' + bodyId);
            BC.ajax({
                url: '/api/channel-type/tree',
                type: 'GET',
                data: { parentId: parentId },
                success: function(res) {
                    $body.data('loaded', true);
                    if (res.length > 0) {
                        res.forEach(function(child) {
                            $body.append(buildTypeCard(child));
                        });
                    } else {
                        $body.append('<div class="bc-collapse-empty"><i class="bi bi-inbox me-1"></i>暂无下级类型</div>');
                    }
                }
            });
        }

        function addChannelTypeSub(parentId, parentName) {
            openModal(null, function() {
                $('#modalTitle').text('新增下级类型 - ' + parentName);
                $('#parentId').val(parentId);
                $('#typeLevel').val('2');
                $('#typeName').val('渠道定义');
            });
        }

        function openModal(id, onReady) {
            $('#channelTypeForm')[0].reset();
            $('#channelTypeId').val('');
            if (!onReady) $('#modalTitle').text(id ? '编辑渠道类型' : '新增渠道类型');

            if (!id) {
                $('#typeName').val('渠道类型');
                $('#typeLevel').val('1');
            }

            BC.ajax({
                url: '/api/channel-type/tree',
                type: 'GET',
                success: function (res) {
                    var select = $('#parentId');
                    select.empty().append('<option value="0">无（顶级类型）</option>');

                    function addOptions(nodes, level) {
                        nodes.forEach(function (node) {
                            if (node.id !== id) {
                                var prefix = '　'.repeat(level);
                                select.append('<option value="' + node.id + '">' + prefix + node.typeName + '</option>');
                                if (node.children) addOptions(node.children, level + 1);
                            }
                        });
                    }
                    addOptions(res, 0);

                    function done() {
                        if (onReady) onReady();
                        BC.showModal('#channelTypeModal');
                    }

                    if (id) {
                        BC.ajax({
                            url: '/api/channel-type/' + id,
                            type: 'GET',
                            success: function (res) {
                                var d = res;
                                $('#channelTypeId').val(d.id);
                                $('#parentId').val(d.parentId);
                                $('#typeLevel').val(d.parentId === '0' ? '1' : '2');
                                $('#typeName').val(d.typeName);
                                $('#typeCode').val(d.typeCode);
                                $('#sort').val(d.sort);
                                $('#status').val(d.status);
                                $('#remark').val(d.remark);
                                done();
                            }
                        });
                    } else {
                        done();
                    }
                }
            });
        }

        function saveChannelType() {
            var id = $('#channelTypeId').val();
            var data = {
                parentId: $('#parentId').val(),
                typeName: $('#typeName').val(),
                typeCode: $('#typeCode').val(),
                sort: $('#sort').val(),
                status: $('#status').val(),
                remark: $('#remark').val()
            };

            if (!data.typeName) {
                BC.toast('请输入类型名称', 'warning');
                return;
            }

            var type = id ? 'PUT' : 'POST';
            var url = '/api/channel-type' + (id ? '/' + id : '');

            BC.ajax({
                url: url,
                type: type,
                data: data,
                success: function (res) {
                    BC.hideModal('#channelTypeModal');
                    BC.toast(res.message, 'success');
                    loadChannelTypeData();
                }
            });
        }

        function deleteChannelType(id) {
            BC.confirm({
                title: '删除渠道类型',
                message: '确定要移除该渠道类型吗？如果该类型下存在子级，子级也将被一并移除！',
                type: 'danger'
            }, function (confirmed) {
                if (confirmed) {
                    BC.ajax({
                        url: '/api/channel-type/' + id,
                        type: 'DELETE',
                        success: function (res) {
                            BC.toast(res.message, 'success');
                            loadChannelTypeData();
                        }
                    });
                }
            });
        }

        function resetSearch() {
            $('#searchForm')[0].reset();
            $('#searchLevel2').html('<option value="">所有二级类型</option>');
            loadChannelTypeData();
        }
    </script>
</body>

</html>
