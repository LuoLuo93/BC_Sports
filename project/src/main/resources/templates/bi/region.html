<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地区管理 - BC体育后台中心</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 自定义CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <!-- 侧边栏 -->
    <div th:replace="~{common/fragments :: sidebar}"></div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 顶部导航 -->
        <nav th:replace="~{common/fragments :: top-navbar}"></nav>

        <!-- 内容区域 -->
        <div class="content-wrapper">
            <div class="bc-card">
                <div class="bc-card-body">
                    <!-- 搜索与操作栏 -->
                    <form class="row g-3 bc-toolbar align-items-center" id="searchForm">
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-geo-alt"></i>
                                <input type="text" class="bc-input" id="searchName" placeholder="搜索区域名称或行政编码...">
                            </div>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchLevel1">
                                <option value="">全部一级地区</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchLevel2">
                                <option value="">全部二级地区</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchStatus">
                                <option value="">全部状态</option>
                                <option value="1">正常</option>
                                <option value="0">停用</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn bc-btn-primary" onclick="loadRegionData()">
                                <i class="bi bi-search"></i> 查询
                            </button>
                            <button type="button" class="btn bc-btn-secondary" onclick="resetSearch()">
                                <i class="bi bi-arrow-counterclockwise"></i> 重置
                            </button>
                        </div>
                        <div class="col-auto ms-auto" th:if="${#lists.contains(permissions, '*') or #lists.contains(permissions, 'bi:region:add')}">
                            <button type="button" class="btn bc-btn-success" id="addBtn">
                                <i class="bi bi-plus-lg"></i> 新增区域
                            </button>
                        </div>
                    </form>

                    <div class="bc-table-container" id="regionTreeContainer">
                        <!-- 折叠面板动态加载 -->
                    </div>

                </div>
            </div>

            <!-- 分页组件 -->
            <div th:replace="~{common/fragments :: pagination}"></div>

        </div>

        <div th:replace="~{common/fragments :: footer}"></div>
    </div>

    <!-- 添加/编辑模态框 -->
    <div class="modal fade" id="regionModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bc-modal-content">
                <div class="modal-header bc-modal-header">
                    <h5 class="modal-title bc-modal-title">
                        <i class="bi bi-geo-alt"></i> <span id="modalTitle">新增区域</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bc-modal-body">
                    <form id="regionForm">
                        <input type="hidden" id="regionId">
                        <div class="bc-form-grid">
                            <div class="bc-form-group bc-form-group-full">
                                <label class="bc-form-label">上级区域</label>
                                <select class="bc-select" id="parentId">
                                    <option value="0">无（顶级区域）</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">区域名称 <span class="text-danger">*</span></label>
                                <input type="text" class="bc-input" id="regionName" placeholder="如：广东省" required>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">行政编码</label>
                                <input type="text" class="bc-input" id="regionCode" placeholder="如：440000">
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">区域级别</label>
                                <select class="bc-select" id="regionType">
                                    <option value="1">一级地区</option>
                                    <option value="2">二级地区</option>
                                    <option value="3">三级地区</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">显示排序</label>
                                <input type="number" class="bc-input" id="sort" value="0">
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">状态</label>
                                <select class="bc-select" id="status">
                                    <option value="1">启用</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                            <div class="bc-form-group-full">
                                <label class="bc-form-label">备注</label>
                                <textarea class="bc-textarea" id="remark" rows="2" placeholder="补充说明信息..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bc-modal-footer">
                    <button type="button" class="btn bc-btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn bc-btn-primary" id="saveBtn">保存区域</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 通用确认弹窗 -->
    <div th:replace="~{common/fragments :: confirm-modal}"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script th:inline="javascript">
          // 将后端注入的权限列表同步到前端 JS 作用域
        window.userPermissions = /*[[${permissions}]]*/ [];
        
    </script>
    <script src="/js/common.js"></script>

    <script>
        var currentPage = 1;
        var pageSize = 10;

        $(document).ready(function() {
            loadSearchDropdowns();
            loadRegionData();

            $('#addBtn').click(function() {
                openModal();
            });

            $('#saveBtn').click(function() {
                saveRegion();
            });

            // 联动逻辑
            $('#searchLevel1').change(function() {
                loadSearchLevel2($(this).val());
            });
        });

        function loadSearchDropdowns() {
            BC.ajax({
                url: '/api/region/tree?parentId=0',
                type: 'GET',
                success: function(res) {
                    var html = '<option value="">全部一级地区</option>';
                    res.forEach(item => {
                        html += `<option value="${BC.escapeHtml(item.id)}">${BC.escapeHtml(item.regionName)}</option>`;
                    });
                    $('#searchLevel1').html(html);
                }
            });
        }

        function loadSearchLevel2(parentId) {
            var select2 = $('#searchLevel2');
            if (!parentId) {
                select2.html('<option value="">全部二级地区</option>');
                return;
            }
            BC.ajax({
                url: '/api/region/tree?parentId=' + parentId,
                type: 'GET',
                success: function(res) {
                    var html = '<option value="">全部二级地区</option>';
                    res.forEach(item => {
                        html += `<option value="${BC.escapeHtml(item.id)}">${BC.escapeHtml(item.regionName)}</option>`;
                    });
                    select2.html(html);
                }
            });
        }

        function loadRegionData(page) {
            if (page) currentPage = page;
            var params = {
                regionName: $('#searchName').val(),
                status: $('#searchStatus').val(),
                level1Id: $('#searchLevel1').val(),
                level2Id: $('#searchLevel2').val(),
                pageNum: currentPage,
                pageSize: pageSize
            };

            BC.ajax({
                url: '/api/region/page',
                type: 'GET',
                data: params,
                success: function(res) {
                    renderTable(res.records);
                    renderPagination(res);
                }
            });
        }

        function renderPagination(data) {
            BC.renderPagination({
                total: data.total,
                pages: data.pages,
                current: data.pageNum,
                callback: function(p) {
                    loadRegionData(p);
                }
            });
        }

        function makeRegionTypeTag(type) {
            switch(type) {
                case 1: return BC.getTag('info', '一级地区');
                case 2: return BC.getTag('success', '二级地区');
                case 3: return BC.getTag('warning', '三级地区');
                default: return '';
            }
        }
        function makeRegionActions(item) {
            var btn = [];
            if (BC.hasPermission('bi:region:add') && item.regionType === 1) {
                btn.push({ icon: 'bi-plus-lg', title: '添加下级', onclick: 'addRegionSub(\'' + item.id + '\', ' + JSON.stringify(item.regionName || '') + ', ' + item.regionType + ')' });
            }
            if (BC.hasPermission('bi:region:edit')) {
                btn.push({ icon: 'bi-pencil', title: '编辑', onclick: 'openModal(\'' + item.id + '\')' });
            }
            if (BC.hasPermission('bi:region:delete')) {
                btn.push({ icon: 'bi-trash', title: '删除', onclick: 'deleteRegion(\'' + item.id + '\')' });
            }
            return '<div class="bc-collapse-actions">' + BC.getTableActions(btn) + '</div>';
        }
        var _regionUid = 0;

        function renderTable(data) {
            var container = $('#regionTreeContainer');
            container.empty();
            _regionUid = 0;

            if (!data || data.length === 0) {
                container.html('<div class="text-center py-5"><i class="bi bi-geo-alt" style="font-size:2rem;color:#cbd5e1;"></i><p class="text-muted mt-2 mb-0">暂无区域数据</p></div>');
                return;
            }

            data.forEach(function(item) {
                container.append(buildRegionCard(item));
            });

            container.off('click', '.bc-collapse-header').on('click', '.bc-collapse-header', function(e) {
                if ($(e.target).closest('.bc-collapse-actions').length) return;
                var $header = $(this);
                var target = $header.data('target');
                var $body = $('#' + target);
                if (!$body.data('loaded')) {
                    var parentId = $header.data('parent-id');
                    loadSubRegions(parentId, target);
                }
                $body.toggleClass('open');
                $header.find('.bc-collapse-arrow').toggleClass('open');
                $header.toggleClass('expanded');
            });
        }

        function buildRegionCard(item) {
            var typeTag = makeRegionTypeTag(item.regionType);
            var statusTag = BC.getTag(item.status === 1 ? 'success' : 'danger', item.status === 1 ? '启用' : '禁用');
            var hasChildren = item.hasChildren;
            var uid = 'region-' + (_regionUid++);

            // 有子节点：折叠面板
            if (hasChildren) {
                var h = '<div class="bc-collapse-card">';
                h += '<div class="bc-collapse-header" data-target="' + uid + '" data-parent-id="' + item.id + '">';
                h +=   '<div class="bc-collapse-title">';
                h +=     '<i class="bi bi-chevron-right bc-collapse-arrow"></i>';
                h +=     '<i class="bi bi-geo-alt"></i>';
                h +=     '<span>' + BC.escapeHtml(item.regionName || '') + '</span>';
                h +=     typeTag + statusTag;
                h +=   '</div>';
                h +=   '<div class="bc-collapse-meta">';
                if (item.regionCode) h += '<code>' + BC.escapeHtml(item.regionCode) + '</code>';
                if (item.sort) h += '<span>排序 ' + item.sort + '</span>';
                h +=   '</div>';
                h +=   makeRegionActions(item);
                h += '</div>';
                h += '<div class="bc-collapse-body" id="' + uid + '"></div>';
                h += '</div>';
                return h;
            }

            // 无子节点：单行
            var h = '<div class="bc-collapse-item">';
            h +=   '<div class="bc-collapse-item-info">';
            h +=     '<span class="bc-collapse-item-dot"></span>';
            h +=     '<i class="bi bi-geo-alt" style="color:var(--text-muted);"></i>';
            h +=     '<span>' + BC.escapeHtml(item.regionName || '') + '</span>';
            h +=     typeTag + statusTag;
            h +=   '</div>';
            h +=   '<div class="bc-collapse-item-detail">';
            if (item.regionCode) h += '<code>' + BC.escapeHtml(item.regionCode) + '</code>';
            if (item.sort) h += '<span>排序 ' + item.sort + '</span>';
            h +=   '</div>';
            h +=   makeRegionActions(item);
            h += '</div>';
            return h;
        }

        function loadSubRegions(parentId, bodyId) {
            var $body = $('#' + bodyId);
            BC.ajax({
                url: '/api/region/tree',
                type: 'GET',
                data: { parentId: parentId },
                success: function(res) {
                    $body.data('loaded', true);
                    if (res.length > 0) {
                        res.forEach(function(child) {
                            $body.append(buildRegionCard(child));
                        });
                    } else {
                        $body.append('<div class="bc-collapse-empty"><i class="bi bi-inbox me-1"></i>暂无下级区域</div>');
                    }
                }
            });
        }

        function addRegionSub(parentId, parentName, parentType) {
            openModal(null, function() {
                $('#modalTitle').text('新增下级区域 - ' + parentName);
                $('#parentId').val(parentId);
                var nextType = Math.min(parseInt(parentType) + 1, 3);
                $('#regionType').val(nextType);
            });
        }

        function openModal(id, onReady) {
            $('#regionForm')[0].reset();
            $('#regionId').val('');
            if (!onReady) $('#modalTitle').text(id ? '编辑区域' : '新增区域');

            BC.ajax({
                url: '/api/region/tree',
                type: 'GET',
                success: function(res) {
                    var select = $('#parentId');
                    select.empty().append('<option value="0">无（顶级区域）</option>');

                    function addOptions(nodes, level) {
                        nodes.forEach(function(node) {
                            if (node.id !== id) {
                                var prefix = '　'.repeat(level);
                                select.append('<option value="' + node.id + '">' + prefix + node.regionName + '</option>');
                                if (node.children) addOptions(node.children, level + 1);
                            }
                        });
                    }
                    addOptions(res, 0);

                    function done() {
                        if (onReady) onReady();
                        BC.showModal('#regionModal');
                    }

                    if (id) {
                        BC.ajax({
                            url: '/api/region/' + id,
                            type: 'GET',
                            success: function(res) {
                                var d = res;
                                $('#regionId').val(d.id);
                                $('#parentId').val(d.parentId);
                                $('#regionName').val(d.regionName);
                                $('#regionCode').val(d.regionCode);
                                $('#regionType').val(d.regionType);
                                $('#sort').val(d.sort);
                                $('#status').val(d.status);
                                $('#remark').val(d.remark);
                                done();
                            }
                        });
                    } else {
                        done();
                    }
                }
            });
        }

        function saveRegion() {
            var id = $('#regionId').val();
            var data = {
                parentId: $('#parentId').val(),
                regionName: $('#regionName').val(),
                regionCode: $('#regionCode').val(),
                regionType: $('#regionType').val(),
                sort: $('#sort').val(),
                status: $('#status').val(),
                remark: $('#remark').val()
            };

            if (!data.regionName) {
                BC.toast('请输入区域名称', 'warning');
                return;
            }

            var type = id ? 'PUT' : 'POST';
            var url = '/api/region' + (id ? '/' + id : '');

            BC.ajax({
                url: url,
                type: type,
                data: data,
                success: function(res) {
                    BC.hideModal('#regionModal');
                    BC.toast(res.message, 'success');
                    loadRegionData();
                }
            });
        }

        function deleteRegion(id) {
            BC.confirm({
                title: '删除区域',
                message: '确定要移除该区域吗？如果该区域下存在子级，子级也将被一并移除！',
                type: 'danger'
            }, function(confirmed) {
                if (confirmed) {
                    BC.ajax({
                        url: '/api/region/' + id,
                        type: 'DELETE',
                        success: function(res) {
                            BC.toast(res.message, 'success');
                            loadRegionData();
                        }
                    });
                }
            });
        }

        function resetSearch() {
            $('#searchForm')[0].reset();
            $('#searchLevel2').html('<option value="">全部二级地区</option>');
            loadRegionData();
        }
    </script>
</body>
</html>
