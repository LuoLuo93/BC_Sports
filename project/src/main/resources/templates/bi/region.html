<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地区管理 - BC体育后台中心</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 自定义CSS -->
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body>
    <!-- 侧边栏 -->
    <div th:replace="~{common/fragments :: sidebar}"></div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 顶部导航 -->
        <nav th:replace="~{common/fragments :: top-navbar}"></nav>

        <!-- 内容区域 -->
        <div class="content-wrapper">
            <div class="bc-card">
                <div class="bc-card-body">
                    <!-- 搜索与操作栏 -->
                    <form class="row g-3 bc-toolbar align-items-center" id="searchForm">
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-geo-alt"></i>
                                <input type="text" class="bc-input" id="searchName" placeholder="搜索区域名称或行政编码...">
                            </div>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchLevel1">
                                <option value="">全部一级地区</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchLevel2">
                                <option value="">全部二级地区</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchStatus">
                                <option value="">全部状态</option>
                                <option value="1">正常</option>
                                <option value="0">停用</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn bc-btn-primary" onclick="loadRegionData()">
                                <i class="bi bi-search"></i> 查询
                            </button>
                            <button type="button" class="btn bc-btn-secondary" onclick="resetSearch()">
                                <i class="bi bi-arrow-counterclockwise"></i> 重置
                            </button>
                        </div>
                        <div class="col-auto ms-auto" th:if="${#lists.contains(permissions, '*') or #lists.contains(permissions, 'bi:region:add')}">
                            <button type="button" class="btn bc-btn-success" id="addBtn">
                                <i class="bi bi-plus-lg"></i> 新增区域
                            </button>
                        </div>
                    </form>

                    <div class="bc-table-container">
                        <table class="bc-table bc-table-hover">
                            <thead>
                                <tr>
                                    <th style="width: 80px;">序号</th>
                                    <th>区域名称</th>
                                    <th style="width: 150px;">行政编码</th>
                                    <th style="width: 150px;">级别</th>
                                    <th style="width: 100px;">排序</th>
                                    <th style="width: 100px;">状态</th>
                                    <th style="width: 120px;" class="text-end">管理操作</th>
                                </tr>
                            </thead>
                            <tbody id="regionTableBody">
                                <!-- 动态加载数据 -->
                            </tbody>
                        </table>
                    </div>

                    <!-- 分页组件 -->
                    <div th:replace="~{common/fragments :: pagination}"></div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- 添加/编辑模态框 -->
    <div class="modal fade" id="regionModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bc-modal-content">
                <div class="modal-header bc-modal-header">
                    <h5 class="modal-title bc-modal-title">
                        <i class="bi bi-geo-alt"></i> <span id="modalTitle">新增区域</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bc-modal-body">
                    <form id="regionForm">
                        <input type="hidden" id="regionId">
                        <div class="bc-form-grid">
                            <div class="bc-form-group bc-form-group-full">
                                <label class="bc-form-label">上级区域</label>
                                <select class="bc-select" id="parentId">
                                    <option value="0">无（顶级区域）</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">区域名称 <span class="text-danger">*</span></label>
                                <input type="text" class="bc-input" id="regionName" placeholder="如：广东省" required>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">行政编码</label>
                                <input type="text" class="bc-input" id="regionCode" placeholder="如：440000">
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">区域级别</label>
                                <select class="bc-select" id="regionType">
                                    <option value="1">一级地区</option>
                                    <option value="2">二级地区</option>
                                    <option value="3">三级地区</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">显示排序</label>
                                <input type="number" class="bc-input" id="sort" value="0">
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">状态</label>
                                <select class="bc-select" id="status">
                                    <option value="1">启用</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                            <div class="bc-form-group-full">
                                <label class="bc-form-label">备注</label>
                                <textarea class="bc-textarea" id="remark" rows="2" placeholder="补充说明信息..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bc-modal-footer">
                    <button type="button" class="btn bc-btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn bc-btn-primary" id="saveBtn">保存区域</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 通用确认弹窗 -->
    <div th:replace="~{common/fragments :: confirm-modal}"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script th:inline="javascript">
          // 将后端注入的权限列表同步到前端 JS 作用域
        window.userPermissions = /*[[${permissions}]]*/ [];
        
        function hasPermission(p) {
            if (!window.userPermissions) return false;
            return window.userPermissions.includes('*') || window.userPermissions.includes(p);
        }
    </script>
    <script src="/js/common.js"></script>

    <script>
        var currentPage = 1;
        var pageSize = 10;

        $(document).ready(function() {
            loadSearchDropdowns();
            loadRegionData();

            $('#addBtn').click(function() {
                openModal();
            });

            $('#saveBtn').click(function() {
                saveRegion();
            });

            // 联动逻辑
            $('#searchLevel1').change(function() {
                loadSearchLevel2($(this).val());
            });
        });

        function loadSearchDropdowns() {
            $.get('/api/region/tree?parentId=0', function(res) {
                if (res.code === 200) {
                    var html = '<option value="">全部一级地区</option>';
                    res.data.forEach(item => {
                        html += `<option value="${item.id}">${item.regionName}</option>`;
                    });
                    $('#searchLevel1').html(html);
                }
            });
        }

        function loadSearchLevel2(parentId) {
            var select2 = $('#searchLevel2');
            if (!parentId) {
                select2.html('<option value="">全部二级地区</option>');
                return;
            }
            $.get('/api/region/tree?parentId=' + parentId, function(res) {
                if (res.code === 200) {
                    var html = '<option value="">全部二级地区</option>';
                    res.data.forEach(item => {
                        html += `<option value="${item.id}">${item.regionName}</option>`;
                    });
                    select2.html(html);
                }
            });
        }

        function loadRegionData(page) {
            if (page) currentPage = page;
            var params = {
                regionName: $('#searchName').val(),
                status: $('#searchStatus').val(),
                level1Id: $('#searchLevel1').val(),
                level2Id: $('#searchLevel2').val(),
                pageNum: currentPage,
                pageSize: pageSize
            };

            $.get('/api/region/page', params, function(res) {
                if (res.code === 200) {
                    renderTable(res.data.records);
                    renderPagination(res.data);
                } else {
                    BC.toast(res.message, 'error');
                }
            });
        }

        function renderPagination(data) {
            BC.renderPagination({
                total: data.total,
                pages: data.pages,
                current: data.current,
                callback: function(p) {
                    loadRegionData(p);
                }
            });
        }

        function renderTable(data) {
            var tbody = $('#regionTableBody');
            tbody.empty();

            if (!data || data.length === 0) {
                tbody.append('<tr><td colspan="7" class="text-center py-4">暂无区域数据</td></tr>');
                return;
            }

            // 判断是否处于搜索模式
            var isSearchMode = $('#searchName').val() || $('#searchLevel1').val() || $('#searchLevel2').val();

            var globalIndex = (currentPage - 1) * pageSize;
            data.forEach(function(item) {
                globalIndex++;
                tbody.append(renderRow(item, 0, globalIndex, isSearchMode));
            });
        }

        function renderRow(item, level, index, isSearchMode) {
            var indent = level * 24;
            var typeTag = '';
            switch(item.regionType) {
                case 1: typeTag = BC.getTag('info', '一级地区'); break;
                case 2: typeTag = BC.getTag('success', '二级地区'); break;
                case 3: typeTag = BC.getTag('success', '三级地区'); break;
            }

            var statusTag = BC.getTag(item.status === 1 ? 'success' : 'danger', item.status === 1 ? '启用' : '禁用');
            
            var btnGroup = [];
            if (hasPermission('bi:region:add') && item.regionType === 1) {
                btnGroup.push({ icon: 'bi-plus-lg', title: '添加下级区域', onclick: `addRegionSub('${item.id}', '${item.regionName}', ${item.regionType})` });
            }
            if (hasPermission('bi:region:edit')) {
                btnGroup.push({ icon: 'bi-pencil', title: '编辑区域', onclick: `openModal('${item.id}')` });
            }
            if (hasPermission('bi:region:delete')) {
                btnGroup.push({ icon: 'bi-trash', title: '注销区域', onclick: `deleteRegion('${item.id}')` });
            }

            var actions = BC.getTableActions(btnGroup);

            var displayName = isSearchMode ? (item.fullPath || item.regionName) : item.regionName;
            var displayIndent = isSearchMode ? 0 : indent;

            // 懒加载控制：如果是浏览模式且有子节点，显示展开图标
            var expandIcon = '';
            if (!isSearchMode && item.hasChildren) {
                expandIcon = `<i class="bi bi-chevron-right expand-icon me-2" style="cursor:pointer;" onclick="toggleRegion(this, '${item.id}', ${level + 1})"></i>`;
            } else {
                expandIcon = `<i class="bi bi-geo-alt text-muted me-2"></i>`;
            }

            return `
                <tr id="row-${item.id}" data-id="${item.id}" data-level="${level}" class="${item.parentId !== '0' ? 'child-row' : ''}">
                    <td><span class="text-muted small">${index || '-'}</span></td>
                    <td style="padding-left: ${displayIndent + 20}px">
                        ${expandIcon}
                        <span class="fw-bold text-main">${displayName}</span>
                    </td>
                    <td><code class="small text-muted">${item.regionCode || '-'}</code></td>
                    <td>${typeTag}</td>
                    <td><span class="small">${item.sort}</span></td>
                    <td>${statusTag}</td>
                    <td class="text-end">${actions}</td>
                </tr>
            `;
        }

        function toggleRegion(icon, parentId, nextLevel) {
            var $icon = $(icon);
            var $row = $(`#row-${parentId}`);
            var isExpanded = $icon.hasClass('bi-chevron-down');

            if (isExpanded) {
                // 折叠：删除所有子孙行
                $icon.removeClass('bi-chevron-down').addClass('bi-chevron-right');
                collapseChildren(parentId);
            } else {
                // 展开：如果有缓存则显示，没有则请求
                $icon.removeClass('bi-chevron-right').addClass('bi-chevron-down');
                loadSubRegions(parentId, nextLevel, $row);
            }
        }

        function loadSubRegions(parentId, level, $parentRow) {
            $.get('/api/region/tree', { parentId: parentId }, function(res) {
                if (res.code === 200 && res.data.length > 0) {
                    var html = '';
                    res.data.forEach(item => {
                        html += renderRow(item, level, null, false);
                    });
                    $parentRow.after(html);
                }
            });
        }

        function collapseChildren(parentId) {
            // 简单逻辑：移除所有 parentId 等于 parentId 的行，以及它们的后代
            // 在本系统中由于只有2层，直接查找并移除即可
            $(`#regionTableBody tr`).each(function() {
                var currentId = $(this).data('id');
                // 这里检查是否属于该父节点的子孙
                // 这里可以通过更复杂的逻辑，或者在当前层级下直接移除
            });
            
            // 改进：为了支持多层，我们可以在 renderRow 时添加 data-parent-id 属性
            $(`tr`).each(function() {
                // 由于目前只有两层，且添加了 data-id，我们可以简单处理
                // 如果 parentId 是 0 的节点，折叠时移除所有不是 parentId 为 0 且其父级路径包含该 ID 的行
            });
            
            // 为了简化实现，我们重新加载一级数据或简单移除
            // 对于 2 层结构，直接移除所有 parentId 属性匹配的行即可（需给 tr 添加 data-parent-id）
            loadRegionData(); // 最稳妥的方式是重新加载当前页
        }

        function addRegionSub(parentId, parentName, parentType) {
            openModal(); // 先置空并打开
            $('#modalTitle').text('新增下级区域 - ' + parentName);
            
            // 延迟设置，确保 openModal 中的 select 加载完成后能选中
            setTimeout(function() {
                $('#parentId').val(parentId);
                var nextType = Math.min(parseInt(parentType) + 1, 3);
                $('#regionType').val(nextType);
            }, 300);
        }

        function openModal(id) {
            $('#regionForm')[0].reset();
            $('#regionId').val('');
            $('#modalTitle').text(id ? '编辑区域' : '新增区域');
            
            // 加载上级选项
            $.get('/api/region/tree', function(res) {
                var select = $('#parentId');
                select.empty().append('<option value="0">无（顶级区域）</option>');
                
                function addOptions(nodes, level) {
                    nodes.forEach(function(node) {
                        if (node.id !== id) { // 不能选自己作为上级
                            var prefix = '　'.repeat(level);
                            select.append(`<option value="${node.id}">${prefix}${node.regionName}</option>`);
                            if (node.children) addOptions(node.children, level + 1);
                        }
                    });
                }
                addOptions(res.data, 0);

                if (id) {
                    $.get('/api/region/' + id, function(res) {
                        var d = res.data;
                        $('#regionId').val(d.id);
                        $('#parentId').val(d.parentId);
                        $('#regionName').val(d.regionName);
                        $('#regionCode').val(d.regionCode);
                        $('#regionType').val(d.regionType);
                        $('#sort').val(d.sort);
                        $('#status').val(d.status);
                        $('#remark').val(d.remark);
                    });
                }
            });

            $('#regionModal').modal('show');
        }

        function saveRegion() {
            var id = $('#regionId').val();
            var data = {
                parentId: $('#parentId').val(),
                regionName: $('#regionName').val(),
                regionCode: $('#regionCode').val(),
                regionType: $('#regionType').val(),
                sort: $('#sort').val(),
                status: $('#status').val(),
                remark: $('#remark').val()
            };

            if (!data.regionName) {
                BC.toast('请输入区域名称', 'warning');
                return;
            }

            var type = id ? 'PUT' : 'POST';
            var url = '/api/region' + (id ? '/' + id : '');

            $.ajax({
                url: url,
                type: type,
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(res) {
                    if (res.code === 200) {
                        $('#regionModal').modal('hide');
                        BC.toast(res.message, 'success');
                        loadRegionData();
                    } else {
                        BC.toast(res.message, 'error');
                    }
                }
            });
        }

        function deleteRegion(id) {
            BC.confirm({
                title: '删除区域',
                message: '确定要移除该区域吗？如果该区域下存在子级，子级也将被一并移除！',
                type: 'danger'
            }, function(confirmed) {
                if (confirmed) {
                    $.ajax({
                        url: '/api/region/' + id,
                        type: 'DELETE',
                        success: function(res) {
                            if (res.code === 200) {
                                BC.toast(res.message, 'success');
                                loadRegionData();
                            }
                        }
                    });
                }
            });
        }

        function resetSearch() {
            $('#searchForm')[0].reset();
            $('#searchLevel2').html('<option value="">全部二级地区</option>');
            loadRegionData();
        }
    </script>
</body>
</html>
