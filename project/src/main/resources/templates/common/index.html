<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BC体育后台管理系统</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- BC Sport Design System -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <!-- 侧边栏 -->
    <div th:replace="~{common/fragments :: sidebar}"></div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 顶部导航 -->
        <nav th:replace="~{common/fragments :: top-navbar}"></nav>

        <!-- 内容区域 -->
        <div class="content-wrapper">
            <!-- 仪表盘统计核心 -->
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="bc-card h-100">
                        <div class="bc-card-body d-flex align-items-center">
                            <div class="bc-icon-box bg-primary-soft text-primary me-3">
                                <i class="bi bi-people fs-4"></i>
                            </div>
                            <div>
                                <div class="text-muted small fw-semibold text-uppercase mb-1">总用户数</div>
                                <h3 class="mb-0 fw-bold">1,234</h3>
                                <div class="text-success small mt-1"><i class="bi bi-arrow-up-short"></i> +12% 较上月</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="bc-card h-100">
                        <div class="bc-card-body d-flex align-items-center">
                            <div class="bc-icon-box bg-success-soft text-success me-3">
                                <i class="bi bi-activity fs-4"></i>
                            </div>
                            <div>
                                <div class="text-muted small fw-semibold text-uppercase mb-1">活跃会话</div>
                                <h3 class="mb-0 fw-bold">89</h3>
                                <div class="text-success small mt-1"><i class="bi bi-circle-fill me-1" style="font-size: 6px;"></i> 实时在线</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="bc-card h-100">
                        <div class="bc-card-body d-flex align-items-center">
                            <div class="bc-icon-box bg-warning-soft text-warning me-3">
                                <i class="bi bi-cart fs-4"></i>
                            </div>
                            <div>
                                <div class="text-muted small fw-semibold text-uppercase mb-1">今日订单</div>
                                <h3 class="mb-0 fw-bold">456</h3>
                                <div class="text-danger small mt-1"><i class="bi bi-arrow-down-short"></i> -3% 较昨日</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="bc-card h-100">
                        <div class="bc-card-body d-flex align-items-center">
                            <div class="bc-icon-box bg-info-soft text-info me-3">
                                <i class="bi bi-currency-yen fs-4"></i>
                            </div>
                            <div>
                                <div class="text-muted small fw-semibold text-uppercase mb-1">结算营收</div>
                                <h3 class="mb-0 fw-bold">¥12,345</h3>
                                <div class="text-muted small mt-1">当日累计</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <!-- 数据统计图表 -->
                <div class="col-md-8">
                    <div class="bc-card h-100">
                        <div class="bc-card-header d-flex align-items-center">
                            <h5 class="bc-card-title mb-0"><i class="bi bi-bar-chart-line me-2"></i> 业务趋势分析</h5>
                            <div class="ms-auto">
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-outline-secondary active">周</button>
                                    <button class="btn btn-outline-secondary">月</button>
                                </div>
                            </div>
                        </div>
                        <div class="bc-card-body">
                            <div class="d-flex flex-column align-items-center justify-content-center" style="height: 350px; background: rgba(248, 249, 250, 0.5); border-radius: 12px; border: 1px dashed #dee2e6;">
                                <div class="bc-icon-box bg-white shadow-sm mb-3">
                                    <i class="bi bi-graph-up text-primary fs-3"></i>
                                </div>
                                <p class="text-muted fw-500">可视化引擎加载中...</p>
                                <small class="text-muted">正在同步实时交易数据</small>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 动态活动 -->
                <div class="col-md-4">
                    <div class="bc-card h-100">
                        <div class="bc-card-header">
                            <h5 class="bc-card-title mb-0"><i class="bi bi-lightning-charge me-2"></i> 实时动态</h5>
                        </div>
                        <div class="bc-card-body p-0">
                            <div class="list-group list-group-flush">
                                <div class="list-group-item px-4 py-3 border-0">
                                    <div class="d-flex align-items-center mb-1">
                                        <div class="bg-success rounded-circle me-2" style="width: 8px; height: 8px;"></div>
                                        <span class="fw-bold small">用户注册</span>
                                        <small class="ms-auto text-muted">2分钟前</small>
                                    </div>
                                    <p class="mb-0 text-muted small">新用户 <span class="text-main fw-semibold">张三</span> 成功加入系统</p>
                                </div>
                                <div class="list-group-item px-4 py-3 border-0 bg-light-soft">
                                    <div class="d-flex align-items-center mb-1">
                                        <div class="bg-primary rounded-circle me-2" style="width: 8px; height: 8px;"></div>
                                        <span class="fw-bold small">订单完成</span>
                                        <small class="ms-auto text-muted">15分钟前</small>
                                    </div>
                                    <p class="mb-0 text-muted small">订单 <span class="text-main fw-semibold">#12345</span> 已完成银行结算</p>
                                </div>
                                <div class="list-group-item px-4 py-3 border-0">
                                    <div class="d-flex align-items-center mb-1">
                                        <div class="bg-warning rounded-circle me-2" style="width: 8px; height: 8px;"></div>
                                        <span class="fw-bold small">系统通知</span>
                                        <small class="ms-auto text-muted">1小时前</small>
                                    </div>
                                    <p class="mb-0 text-muted small">数据中心预计在 23:00 进行例行维护</p>
                                </div>
                                <div class="list-group-item px-4 py-3 border-0">
                                    <div class="d-flex align-items-center mb-1">
                                        <div class="bg-info rounded-circle me-2" style="width: 8px; height: 8px;"></div>
                                        <span class="fw-bold small">安全合规</span>
                                        <small class="ms-auto text-muted">3小时前</small>
                                    </div>
                                    <p class="mb-0 text-muted small">管理员重置了 <span class="text-main fw-semibold">admin</span> 的安全凭证</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    <!-- 底部页脚 -->
        <div th:replace="~{common/fragments :: footer}"></div>
    </div>

    <!-- 通用确认弹窗 (必须放在 body 直接子节点以确保 fixed 定位有效) -->
    <div th:replace="~{common/fragments :: confirm-modal}"></div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    
    <!-- 公共JavaScript -->
    <script src="/js/common.js"></script>
</body>
</html>
