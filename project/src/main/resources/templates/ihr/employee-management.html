<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人员管理 - BC体育后台管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div th:replace="~{common/fragments :: sidebar}"></div>

    <div class="main-content">
        <nav th:replace="~{common/fragments :: top-navbar}"></nav>

        <div class="content-wrapper">
            <div class="bc-card">
                <div class="bc-card-body">
                    <ul class="nav nav-tabs mb-3" id="mainTabs">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" data-tab="onboarding" id="tabOnboarding">
                                <i class="bi bi-person-check"></i> 人员入职
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-tab="update" id="tabUpdate">
                                <i class="bi bi-arrow-repeat"></i> 人员调整
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-tab="leaving" id="tabLeaving">
                                <i class="bi bi-person-x"></i> 人员离职
                            </a>
                        </li>
                    </ul>

                    <form class="row g-3 bc-toolbar align-items-center" id="searchForm">
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-person"></i>
                                <input type="text" class="bc-input" id="searchStaffName" placeholder="搜索员工姓名">
                            </div>
                        </div>
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-card-text"></i>
                                <input type="text" class="bc-input" id="searchStaffNo" placeholder="搜索工号">
                            </div>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchSyncStatus">
                                <option value="">全部状态</option>
                                <option value="0">未同步</option>
                                <option value="1">已同步</option>
                                <option value="2">同步失败</option>
                                <option value="3">已跳过</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-calendar"></i>
                                <input type="date" class="bc-input" id="searchStartDate">
                            </div>
                        </div>
                        <div class="col-auto bc-date-range"><span>至</span></div>
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-calendar"></i>
                                <input type="date" class="bc-input" id="searchEndDate">
                            </div>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn bc-btn-primary" id="searchBtn">
                                <i class="bi bi-search"></i> 查询
                            </button>
                            <button type="button" class="btn bc-btn-secondary" id="resetBtn">
                                <i class="bi bi-arrow-counterclockwise"></i> 重置
                            </button>
                            <button type="button" class="btn bc-btn-warning" id="syncIhrBtn" th:if="${#lists.contains(permissions, '*') or #lists.contains(permissions, 'ihr:onboarding:sync') or #lists.contains(permissions, 'ihr:update:sync') or #lists.contains(permissions, 'ihr:leaving:sync')}">
                                <i class="bi bi-cloud-download"></i> 同步IHR员工
                            </button>
                            <button type="button" class="btn bc-btn-success" id="syncQywxBtn" th:if="${#lists.contains(permissions, '*') or #lists.contains(permissions, 'ihr:onboarding:sync') or #lists.contains(permissions, 'ihr:update:sync') or #lists.contains(permissions, 'ihr:leaving:sync')}">
                                <i class="bi bi-cloud-upload"></i> 同步企微
                            </button>
                        </div>
                    </form>

                    <div class="bc-table-container">
                        <table class="bc-table bc-table-hover" id="dataTable">
                            <thead>
                                <tr>
                                    <th style="width: 60px;">序号</th>
                                    <th>姓名</th>
                                    <th>工号</th>
                                    <th>手机号</th>
                                    <th>部门</th>
                                    <th id="thDate">入职日期</th>
                                    <th style="width: 100px;">同步状态</th>
                                    <th style="width: 150px;">同步时间</th>
                                    <th>错误信息</th>
                                    <th style="width: 100px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="dataTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div th:replace="~{common/fragments :: pagination}"></div>
        </div>

        <div th:replace="~{common/fragments :: footer}"></div>
    </div>

    <div th:replace="~{common/fragments :: confirm-modal}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script th:inline="javascript">
        window.userPermissions = /*[[${permissions}]]*/ [];
    </script>
    <script src="/js/common.js"></script>

    <script>
        var currentTab = 'onboarding';
        var tabPage = { onboarding: 1, update: 1, leaving: 1 };
        var tabSearch = {
            onboarding: { staffName: '', staffNo: '', syncStatus: '', startDate: '', endDate: '' },
            update:     { staffName: '', staffNo: '', syncStatus: '', startDate: '', endDate: '' },
            leaving:    { staffName: '', staffNo: '', syncStatus: '', startDate: '', endDate: '' }
        };
        var pageSize = 10;

        var tabConfig = {
            onboarding: {
                pageApi: '/api/ihr-onboarding/page',
                syncIhrApi: '/api/ihr-onboarding/sync-ihr',
                syncQywxApi: '/api/ihr-onboarding/sync-qywx',
                syncPerm: 'ihr:onboarding:sync',
                dateHeader: '入职日期',
                dateField: 'enrollInDate',
                idField: 'employeesId'
            },
            update: {
                pageApi: '/api/ihr-update/page',
                syncIhrApi: '/api/ihr-update/sync-ihr',
                syncQywxApi: '/api/ihr-update/sync-qywx',
                syncPerm: 'ihr:update:sync',
                dateHeader: '修改日期',
                dateField: 'modifyDate',
                idField: 'staffId'
            },
            leaving: {
                pageApi: '/api/ihr-leaving/page',
                syncIhrApi: '/api/ihr-leaving/sync-ihr',
                syncQywxApi: '/api/ihr-leaving/sync-qywx',
                syncPerm: 'ihr:leaving:sync',
                dateHeader: '离职日期',
                dateField: 'leaveDate',
                idField: 'employeeId'
            }
        };

        function saveSearchState() {
            tabSearch[currentTab] = {
                staffName: $('#searchStaffName').val(),
                staffNo: $('#searchStaffNo').val(),
                syncStatus: $('#searchSyncStatus').val(),
                startDate: $('#searchStartDate').val(),
                endDate: $('#searchEndDate').val()
            };
        }

        function restoreSearchState(tab) {
            var s = tabSearch[tab];
            $('#searchStaffName').val(s.staffName);
            $('#searchStaffNo').val(s.staffNo);
            $('#searchSyncStatus').val(s.syncStatus);
            $('#searchStartDate').val(s.startDate);
            $('#searchEndDate').val(s.endDate);
        }

        $(document).ready(function() {
            loadData();

            $('#mainTabs .nav-link').click(function(e) {
                e.preventDefault();
                switchTab($(this).data('tab'));
            });

            $('#searchBtn').click(function() {
                saveSearchState();
                tabPage[currentTab] = 1;
                loadData();
            });

            $('#resetBtn').click(function() {
                $('#searchForm')[0].reset();
                tabSearch[currentTab] = { staffName: '', staffNo: '', syncStatus: '', startDate: '', endDate: '' };
                tabPage[currentTab] = 1;
                loadData();
            });

            $('#syncIhrBtn').click(function() {
                var cfg = tabConfig[currentTab];
                BC.triggerGlobalSyncWithLock(cfg.syncIhrApi, 'IHR员工同步', loadData);
            });

            $('#syncQywxBtn').click(function() {
                var $btn = $(this);
                if ($btn.prop('disabled')) return;
                $btn.prop('disabled', true);
                var cfg = tabConfig[currentTab];
                BC.ajax({
                    url: cfg.syncQywxApi,
                    type: 'POST',
                    success: function(res) {
                        BC.toast(res || '企微同步已触发，请稍后刷新查看', 'success');
                        setTimeout(function() { loadData(); }, 3000);
                        setTimeout(function() { $btn.prop('disabled', false); }, 5000);
                    },
                    error: function() {
                        BC.toast('同步失败', 'error');
                        setTimeout(function() { $btn.prop('disabled', false); }, 5000);
                    }
                });
            });

            $(document).on('click', '.sync-single-btn', function() {
                var cfg = tabConfig[currentTab];
                var id = $(this).data('id');
                var $btn = $(this);
                $btn.prop('disabled', true);
                BC.ajax({
                    url: cfg.syncQywxApi + '/' + encodeURIComponent(id),
                    type: 'POST',
                    success: function(res) {
                        BC.toast(res || '同步成功', 'success');
                        loadData();
                    },
                    error: function() {
                        BC.toast('同步失败', 'error');
                        $btn.prop('disabled', false);
                    }
                });
            });
        });

        function switchTab(tab) {
            if (tab === currentTab) return;
            saveSearchState();
            currentTab = tab;
            $('#mainTabs .nav-link').removeClass('active');
            $('[data-tab="' + tab + '"]').addClass('active');
            $('#thDate').text(tabConfig[tab].dateHeader);
            restoreSearchState(tab);
            loadData();
        }

        function loadData() {
            var cfg = tabConfig[currentTab];
            BC.ajax({
                url: cfg.pageApi,
                type: 'GET',
                data: {
                    pageNum: tabPage[currentTab],
                    pageSize: pageSize,
                    staffName: $('#searchStaffName').val(),
                    staffNo: $('#searchStaffNo').val(),
                    syncStatus: $('#searchSyncStatus').val() || undefined,
                    startDate: $('#searchStartDate').val(),
                    endDate: $('#searchEndDate').val()
                },
                success: function(res) {
                    renderTable(res.records);
                    renderPagination(res);
                }
            });
        }

        function renderTable(data) {
            var cfg = tabConfig[currentTab];
            var tbody = $('#dataTableBody');
            tbody.empty();
            if (!data || data.length === 0) {
                tbody.append('<tr><td colspan="10" class="text-center py-5 text-muted">暂无数据</td></tr>');
                return;
            }
            data.forEach(function(item, i) {
                var seq = (tabPage[currentTab] - 1) * pageSize + i + 1;
                var statusTag = renderSyncStatus(item.syncStatus);
                var errMsg = item.errorMessage ? '<span class="small text-danger">' + BC.escapeHtml(item.errorMessage) + '</span>' : '-';

                var actionBtn = '-';
                if (BC.hasPermission(cfg.syncPerm)) {
                    var disabled = (item.syncStatus === 1 || item.syncStatus === 3) ? ' disabled' : '';
                    actionBtn = '<button type="button" class="btn btn-sm bc-btn-success sync-single-btn text-nowrap" data-id="' + BC.escapeHtml(item[cfg.idField] || '') + '"' + disabled + '><i class="bi bi-cloud-upload"></i> 同步企微</button>';
                }

                tbody.append('<tr>' +
                    '<td><span class="text-muted small">' + seq + '</span></td>' +
                    '<td><span class="fw-bold text-main">' + BC.escapeHtml(item.staffName || '') + '</span></td>' +
                    '<td>' + BC.escapeHtml(item.staffNo || '') + '</td>' +
                    '<td>' + BC.escapeHtml(item.mobileNo || '') + '</td>' +
                    '<td>' + BC.escapeHtml(item.departmentName || '') + '</td>' +
                    '<td>' + BC.escapeHtml(item[cfg.dateField] || '') + '</td>' +
                    '<td>' + statusTag + '</td>' +
                    '<td><span class="small text-secondary">' + (item.syncTime || '-') + '</span></td>' +
                    '<td>' + errMsg + '</td>' +
                    '<td class="text-center">' + actionBtn + '</td>' +
                    '</tr>');
            });
        }

        function renderSyncStatus(status) {
            if (status === null || status === undefined || status === 0) {
                return BC.getTag('warning', '未同步');
            }
            switch (status) {
                case 1: return BC.getTag('success', '已同步');
                case 2: return BC.getTag('danger', '同步失败');
                case 3: return BC.getTag('info', '已跳过');
                default: return BC.getTag('secondary', '未知');
            }
        }

        function renderPagination(pageData) {
            BC.renderPagination({
                total: pageData.total,
                pages: pageData.pages,
                current: pageData.pageNum,
                limit: pageData.pageSize,
                callback: function(page) {
                    tabPage[currentTab] = page;
                    loadData();
                }
            });
        }
    </script>
</body>
</html>
