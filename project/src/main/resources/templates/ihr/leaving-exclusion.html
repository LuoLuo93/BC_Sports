
<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHR离职排除 - BC体育后台管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div th:replace="~{common/fragments :: sidebar}"></div>

    <div class="main-content">
        <nav th:replace="~{common/fragments :: top-navbar}"></nav>

        <div class="content-wrapper">
            <div class="bc-card">
                <div class="bc-card-body">
                    <form class="row g-3 bc-toolbar align-items-center" id="searchForm">
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-person"></i>
                                <input type="text" class="bc-input" id="searchStaffName" placeholder="搜索员工姓名">
                            </div>
                        </div>
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-card-text"></i>
                                <input type="text" class="bc-input" id="searchStaffNo" placeholder="搜索工号">
                            </div>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchStatus">
                                <option value="">全部状态</option>
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn bc-btn-primary" id="searchBtn">
                                <i class="bi bi-search"></i> 查询
                            </button>
                            <button type="button" class="btn bc-btn-secondary" id="resetBtn">
                                <i class="bi bi-arrow-counterclockwise"></i> 重置
                            </button>
                        </div>
                        <div class="col-auto ms-auto" th:if="${#lists.contains(permissions, '*') or #lists.contains(permissions, 'ihr:exclusion:add')}">
                            <button type="button" class="btn bc-btn-success" id="addBtn">
                                <i class="bi bi-plus-lg"></i> 新增
                            </button>
                        </div>
                    </form>

                    <div class="bc-table-container">
                        <table class="bc-table bc-table-hover" id="exclusionTable">
                            <thead>
                                <tr>
                                    <th style="width: 80px;">序号</th>
                                    <th>员工姓名</th>
                                    <th>工号</th>
                                    <th>排除原因</th>
                                    <th style="width: 100px;">状态</th>
                                    <th style="width: 160px;">创建时间</th>
                                    <th style="width: 160px;" class="text-end">管理操作</th>
                                </tr>
                            </thead>
                            <tbody id="dataTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div th:replace="~{common/fragments :: pagination}"></div>
        </div>

        <div th:replace="~{common/fragments :: footer}"></div>
    </div>

    <div class="modal fade" id="dataModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bc-modal-content">
                <div class="modal-header bc-modal-header">
                    <h5 class="modal-title bc-modal-title">
                        <i class="bi bi-person-slash"></i> <span id="modalTitle">新增离职排除</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body bc-modal-body">
                    <form id="dataForm">
                        <input type="hidden" id="dataId">
                        <div class="bc-form-grid">
                            <div class="bc-form-group">
                                <label class="bc-form-label">员工姓名 <span class="text-danger">*</span></label>
                                <input type="text" class="bc-input" id="staffName" placeholder="请输入员工姓名" required>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">工号 <span class="text-danger">*</span></label>
                                <input type="text" class="bc-input" id="staffNo" placeholder="请输入工号" required>
                            </div>
                            <div class="bc-form-group">
                                <label class="bc-form-label">状态</label>
                                <select class="bc-select" id="status">
                                    <option value="1">启用</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                            <div class="bc-form-group bc-form-group-full">
                                <label class="bc-form-label">排除原因</label>
                                <textarea class="bc-textarea" id="reason" rows="3" placeholder="请输入排除原因"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bc-modal-footer">
                    <button type="button" class="btn bc-btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn bc-btn-primary" id="saveBtn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{common/fragments :: confirm-modal}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script th:inline="javascript">
        window.userPermissions = /*[[${permissions}]]*/ [];
    </script>
    <script src="/js/common.js"></script>

    <script>
        let currentPage = 1;
        let pageSize = 10;
        const EXCLUSION_TYPE = 2;

        $(document).ready(function() {
            loadDataList();

            $('#searchBtn').click(function() {
                currentPage = 1;
                loadDataList();
            });

            $('#resetBtn').click(function() {
                $('#searchForm')[0].reset();
                currentPage = 1;
                loadDataList();
            });

            $('#addBtn').click(function() {
                openModal('add');
            });

            $('#saveBtn').click(function() {
                saveData();
            });
        });

        function loadDataList() {
            BC.ajax({
                url: '/api/ihr-exclusion/page',
                type: 'GET',
                data: {
                    pageNum: currentPage,
                    pageSize: pageSize,
                    staffName: $('#searchStaffName').val(),
                    staffNo: $('#searchStaffNo').val(),
                    exclusionType: EXCLUSION_TYPE,
                    status: $('#searchStatus').val()
                },
                success: function(res) {
                    renderTable(res.records);
                    renderPagination(res);
                }
            });
        }

        function renderTable(data) {
            const tbody = $('#dataTableBody');
            tbody.empty();
            if (!data || data.length === 0) {
                tbody.append('<tr><td colspan="7" class="text-center py-5 text-muted">暂无数据</td></tr>');
                return;
            }
            data.forEach(function(item, i) {
                const seq = (currentPage - 1) * pageSize + i + 1;
                const statusTag = BC.getTag(item.status === 1 ? 'success' : 'danger', item.status === 1 ? '启用' : '禁用');

                const btnGroup = [];
                if (BC.hasPermission('ihr:exclusion:edit')) {
                    btnGroup.push({ icon: 'bi-pencil', title: '修改', onclick: 'editData(\'' + item.id + '\')' });
                }
                if (BC.hasPermission('ihr:exclusion:delete')) {
                    btnGroup.push({ icon: 'bi-trash', title: '删除', onclick: 'deleteData(\'' + item.id + '\')' });
                }
                const actions = BC.getTableActions(btnGroup);

                tbody.append('<tr>' +
                    '<td><span class="text-muted small">' + seq + '</span></td>' +
                    '<td><span class="fw-bold text-main">' + BC.escapeHtml(item.staffName || '') + '</span></td>' +
                    '<td>' + BC.escapeHtml(item.staffNo || '') + '</td>' +
                    '<td><span class="small text-secondary">' + BC.escapeHtml(item.reason || '-') + '</span></td>' +
                    '<td>' + statusTag + '</td>' +
                    '<td><span class="small text-secondary">' + (item.createTime || '') + '</span></td>' +
                    '<td class="text-end">' + actions + '</td>' +
                    '</tr>');
            });
        }

        function renderPagination(pageData) {
            BC.renderPagination({
                total: pageData.total,
                pages: pageData.pages,
                current: pageData.pageNum,
                limit: pageData.pageSize,
                callback: function(page) {
                    currentPage = page;
                    loadDataList();
                }
            });
        }

        function openModal(mode, id) {
            const modal = $('#dataModal');
            $('#dataForm')[0].reset();
            $('#dataId').val('');

            if (mode === 'add') {
                $('#modalTitle').text('新增离职排除');
                $('#status').val('1');
                modal.modal('show');
            } else {
                $('#modalTitle').text('编辑离职排除');
                BC.ajax({
                    url: '/api/ihr-exclusion/' + id,
                    type: 'GET',
                    success: function(res) {
                        const d = res;
                        $('#dataId').val(d.id);
                        $('#staffName').val(d.staffName);
                        $('#staffNo').val(d.staffNo);
                        $('#status').val(d.status);
                        $('#reason').val(d.reason);
                        modal.modal('show');
                    }
                });
            }
        }

        function editData(id) {
            openModal('edit', id);
        }

        function saveData() {
            const id = $('#dataId').val();
            const data = {
                staffName: $('#staffName').val(),
                staffNo: $('#staffNo').val(),
                exclusionType: EXCLUSION_TYPE,
                status: parseInt($('#status').val()),
                reason: $('#reason').val()
            };

            BC.ajax({
                url: id ? '/api/ihr-exclusion/' + id : '/api/ihr-exclusion',
                type: id ? 'PUT' : 'POST',
                data: data,
                success: function(res) {
                    $('#dataModal').modal('hide');
                    BC.toast(id ? '修改成功' : '新增成功', 'success');
                    loadDataList();
                }
            });
        }

        function deleteData(id) {
            BC.confirm({
                title: '确认删除',
                message: '确定要删除该记录吗？此操作不可撤销。',
                type: 'danger'
            }, function(ok) {
                if (ok) {
                    BC.ajax({
                        url: '/api/ihr-exclusion/' + id,
                        type: 'DELETE',
                        success: function(res) {
                            BC.toast('删除成功', 'success');
                            loadDataList();
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
