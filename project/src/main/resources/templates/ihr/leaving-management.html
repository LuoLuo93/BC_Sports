<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人员离职管理 - BC体育后台管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div th:replace="~{common/fragments :: sidebar}"></div>

    <div class="main-content">
        <nav th:replace="~{common/fragments :: top-navbar}"></nav>

        <div class="content-wrapper">
            <div class="bc-card">
                <div class="bc-card-body">
                    <form class="row g-3 bc-toolbar align-items-center" id="searchForm">
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-person"></i>
                                <input type="text" class="bc-input" id="searchStaffName" placeholder="搜索员工姓名">
                            </div>
                        </div>
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-card-text"></i>
                                <input type="text" class="bc-input" id="searchStaffNo" placeholder="搜索工号">
                            </div>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchSyncStatus">
                                <option value="">全部状态</option>
                                <option value="0">未同步</option>
                                <option value="1">已同步</option>
                                <option value="2">同步失败</option>
                                <option value="3">已跳过</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-calendar"></i>
                                <input type="date" class="bc-input" id="searchStartDate">
                            </div>
                        </div>
                        <div class="col-auto bc-date-range"><span>至</span></div>
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-calendar"></i>
                                <input type="date" class="bc-input" id="searchEndDate">
                            </div>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn bc-btn-primary" id="searchBtn">
                                <i class="bi bi-search"></i> 查询
                            </button>
                            <button type="button" class="btn bc-btn-secondary" id="resetBtn">
                                <i class="bi bi-arrow-counterclockwise"></i> 重置
                            </button>
                            <button type="button" class="btn bc-btn-warning" id="syncIhrBtn" th:if="${#lists.contains(permissions, '*') or #lists.contains(permissions, 'ihr:leaving:sync')}">
                                <i class="bi bi-cloud-download"></i> 同步IHR员工
                            </button>
                        </div>
                    </form>

                    <div class="bc-table-container">
                        <table class="bc-table bc-table-hover" id="dataTable">
                            <thead>
                                <tr>
                                    <th style="width: 60px;">序号</th>
                                    <th>姓名</th>
                                    <th>工号</th>
                                    <th>手机号</th>
                                    <th>部门</th>
                                    <th>离职日期</th>
                                    <th style="width: 100px;">同步状态</th>
                                    <th style="width: 150px;">同步时间</th>
                                    <th>错误信息</th>
                                    <th style="width: 100px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="dataTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div th:replace="~{common/fragments :: pagination}"></div>
        </div>

        <div th:replace="~{common/fragments :: footer}"></div>
    </div>

    <div th:replace="~{common/fragments :: confirm-modal}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script th:inline="javascript">
        window.userPermissions = /*[[${permissions}]]*/ [];
    </script>
    <script src="/js/common.js"></script>

    <script>
        let currentPage = 1;
        let pageSize = 10;

        $(document).ready(function() {
            loadDataList();

            $('#searchBtn').click(function() {
                currentPage = 1;
                loadDataList();
            });

            $('#resetBtn').click(function() {
                $('#searchForm')[0].reset();
                currentPage = 1;
                loadDataList();
            });

            $('#syncIhrBtn').click(function() {
                BC.triggerGlobalSyncWithLock('/api/ihr-leaving/sync-ihr', 'IHR员工同步', loadDataList);
            });

            $(document).on('click', '.sync-single-btn', function() {
                var employeeId = $(this).data('id');
                var $btn = $(this);
                $btn.prop('disabled', true);
                BC.ajax({
                    url: '/api/ihr-leaving/sync-qywx/' + encodeURIComponent(employeeId),
                    type: 'POST',
                    success: function(res) {
                        BC.toast(res || '同步已触发', 'success');
                        loadDataList();
                    },
                    error: function() {
                        BC.toast('同步失败', 'error');
                        $btn.prop('disabled', false);
                    }
                });
            });
        });

        function loadDataList() {
            BC.ajax({
                url: '/api/ihr-leaving/page',
                type: 'GET',
                data: {
                    pageNum: currentPage,
                    pageSize: pageSize,
                    staffName: $('#searchStaffName').val(),
                    staffNo: $('#searchStaffNo').val(),
                    syncStatus: $('#searchSyncStatus').val() || undefined,
                    startDate: $('#searchStartDate').val(),
                    endDate: $('#searchEndDate').val()
                },
                success: function(res) {
                    renderTable(res.records);
                    renderPagination(res);
                }
            });
        }

        function renderTable(data) {
            const tbody = $('#dataTableBody');
            tbody.empty();
            if (!data || data.length === 0) {
                tbody.append('<tr><td colspan="10" class="text-center py-5 text-muted">暂无数据</td></tr>');
                return;
            }
            data.forEach(function(item, i) {
                const seq = (currentPage - 1) * pageSize + i + 1;
                const statusTag = renderSyncStatus(item.syncStatus);
                const errMsg = item.errorMessage ? '<span class="small text-danger">' + BC.escapeHtml(item.errorMessage) + '</span>' : '-';

                var actionBtn = '-';
                if (BC.hasPermission('ihr:leaving:sync')) {
                    var disabled = (item.syncStatus === 1 || item.syncStatus === 3) ? ' disabled' : '';
                    actionBtn = '<button type="button" class="btn btn-sm bc-btn-success sync-single-btn text-nowrap" data-id="' + BC.escapeHtml(item.employeeId || '') + '"' + disabled + '><i class="bi bi-cloud-upload"></i> 同步企微</button>';
                }

                tbody.append('<tr>' +
                    '<td><span class="text-muted small">' + seq + '</span></td>' +
                    '<td><span class="fw-bold text-main">' + BC.escapeHtml(item.staffName || '') + '</span></td>' +
                    '<td>' + BC.escapeHtml(item.staffNo || '') + '</td>' +
                    '<td>' + BC.escapeHtml(item.mobileNo || '') + '</td>' +
                    '<td>' + BC.escapeHtml(item.departmentName || '') + '</td>' +
                    '<td>' + BC.escapeHtml(item.leaveDate || '') + '</td>' +
                    '<td>' + statusTag + '</td>' +
                    '<td><span class="small text-secondary">' + (item.syncTime || '-') + '</span></td>' +
                    '<td>' + errMsg + '</td>' +
                    '<td class="text-center">' + actionBtn + '</td>' +
                    '</tr>');
            });
        }

        function renderSyncStatus(status) {
            if (status === null || status === undefined || status === 0) {
                return BC.getTag('warning', '未同步');
            }
            switch (status) {
                case 1: return BC.getTag('success', '已同步');
                case 2: return BC.getTag('danger', '同步失败');
                case 3: return BC.getTag('info', '已跳过');
                default: return BC.getTag('secondary', '未知');
            }
        }

        function renderPagination(pageData) {
            BC.renderPagination({
                total: pageData.total,
                pages: pageData.pages,
                current: pageData.pageNum,
                limit: pageData.pageSize,
                callback: function(page) {
                    currentPage = page;
                    loadDataList();
                }
            });
        }
    </script>
</body>
</html>
