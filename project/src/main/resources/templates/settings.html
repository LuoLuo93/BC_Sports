<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - BC体育巅峰后台</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 自定义CSS -->
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <style>
        .settings-nav {
            background: white;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid var(--border-light);
            position: sticky;
            top: 24px;
        }
        .settings-nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .settings-nav-item:hover {
            background: #f8fafc;
            color: var(--primary-color);
        }
        .settings-nav-item.active {
            background: rgba(37, 99, 235, 0.05);
            color: var(--primary-color);
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.1);
        }
        .settings-nav-item i {
            font-size: 1.25rem;
        }
        .setting-section-title {
            position: relative;
            padding-left: 16px;
            margin-bottom: 24px;
        }
        .setting-section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            width: 4px;
            background: var(--primary-color);
            border-radius: 4px;
        }
        /* Custom Switch Styling */
        .form-switch .form-check-input {
            width: 3em;
            height: 1.5em;
            cursor: pointer;
            border-radius: 12px;
        }
        .form-switch .form-check-input:checked {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }
        /* Platform Cockpit */
        .platform-info-card {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.1);
        }
        .platform-info-card::after {
            content: "\F52E"; /* bi-gear-wide-connected */
            font-family: "bootstrap-icons";
            position: absolute;
            right: -20px;
            bottom: -20px;
            font-size: 140px;
            opacity: 0.05;
            transform: rotate(-15deg);
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div th:replace="~{common/fragments :: sidebar}"></div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 顶部导航 -->
        <nav th:replace="~{common/fragments :: top-navbar}"></nav>

        <!-- 内容区域 -->
        <div class="content-wrapper">
            <!-- 面包屑 -->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/"><i class="bi bi-house-door"></i> 首页</a></li>
                    <li class="breadcrumb-item active"><i class="bi bi-gear"></i> 系统全局设置</li>
                </ol>
            </nav>

            <div class="row g-4">
                <!-- 左侧分类导航 -->
                <div class="col-lg-3">
                    <div class="settings-nav">
                        <a href="#general" class="settings-nav-item active">
                            <i class="bi bi-window-sidebar"></i>
                            <span>基础品牌</span>
                        </a>
                        <a href="#security" class="settings-nav-item">
                            <i class="bi bi-shield-check"></i>
                            <span>安全防护</span>
                        </a>
                        <a href="#notification" class="settings-nav-item">
                            <i class="bi bi-megaphone"></i>
                            <span>消息通知</span>
                        </a>
                        <a href="#service" class="settings-nav-item">
                            <i class="bi bi-hdd-network"></i>
                            <span>服务节点</span>
                        </a>
                        <a href="#logs" class="settings-nav-item">
                            <i class="bi bi-layout-text-sidebar-reverse"></i>
                            <span>操作审计</span>
                        </a>
                    </div>
                </div>

                <!-- 右侧设置内容 -->
                <div class="col-lg-9">
                    <!-- 平台信息驾驶舱 -->
                    <div class="platform-info-card">
                        <div class="row align-items-center">
                            <div class="col">
                                <h4 class="fw-bold mb-1">BC Sport ERP · 巅峰核心</h4>
                                <p class="text-white-50 mb-0">系统版本：v2.1.0-Elite | 授权状态：已激活企业版</p>
                            </div>
                            <div class="col-auto">
                                <span class="badge bg-success bg-opacity-25 text-success border border-success border-opacity-50 px-3 py-2 rounded-pill">
                                    <i class="bi bi-cpu me-1"></i> 平台负载正常
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- 基础品牌设置 -->
                    <div class="bc-card mb-4" id="general">
                        <div class="bc-card-header">
                            <div class="d-flex align-items-center gap-2">
                                <i class="bi bi-palette text-primary fs-5"></i>
                                <h5 class="mb-0 fw-bold text-main">基础品牌与视觉设置</h5>
                            </div>
                        </div>
                        <div class="bc-card-body">
                            <form id="generalSettingsForm">
                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <div class="bc-form-group">
                                            <label class="bc-form-label">站点全称</label>
                                            <input type="text" class="bc-input" value="BC体育数据管理系统" placeholder="如：BC Sport 全局管理中心">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="bc-form-group">
                                            <label class="bc-form-label">管理台简称</label>
                                            <input type="text" class="bc-input" value="BC SPÖRT" placeholder="用于侧边栏与标题栏">
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="bc-form-group">
                                            <label class="bc-form-label">主标识 (Logo URL)</label>
                                            <div class="bc-input-group">
                                                <i class="bi bi-image"></i>
                                                <input type="text" class="bc-input" placeholder="输入静态资源路径或图片外链地址">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="bc-form-group mb-0">
                                            <label class="bc-form-label">页脚版权声明</label>
                                            <textarea class="bc-textarea" rows="2" placeholder="支持部分 HTML 标签">© 2026 BC体育 & 巅峰探索. 版权所有.</textarea>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- 安全防护策略 -->
                    <div class="bc-card mb-4" id="security">
                        <div class="bc-card-header">
                            <div class="d-flex align-items-center gap-2">
                                <i class="bi bi-shield-lock text-primary fs-5"></i>
                                <h5 class="mb-0 fw-bold text-main">安全审计与防护策略</h5>
                            </div>
                        </div>
                        <div class="bc-card-body">
                            <div class="list-group list-group-flush gap-4">
                                <!-- 2FA -->
                                <div class="d-flex justify-content-between align-items-center px-2 py-1">
                                    <div>
                                        <h6 class="fw-bold mb-1">多因子认证 (2FA)</h6>
                                        <p class="text-muted small mb-0">所有管理员登录时强制要求 Google Authenticator 二次校验</p>
                                    </div>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" checked>
                                    </div>
                                </div>
                                <!-- Password Policy -->
                                <div class="d-flex justify-content-between align-items-center px-2 py-1">
                                    <div>
                                        <h6 class="fw-bold mb-1">强密码强制执行</h6>
                                        <p class="text-muted small mb-0">强制要求密码长度 > 8 位，且必须包含特殊字符与数字</p>
                                    </div>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" checked>
                                    </div>
                                </div>
                                <!-- Session Timeout -->
                                <div class="d-flex justify-content-between align-items-center px-2 py-1">
                                    <div>
                                        <h6 class="fw-bold mb-1">会话自动超时</h6>
                                        <p class="text-muted small mb-0">前端页面无操作后自动断开会话并强制重新登录的时间</p>
                                    </div>
                                    <div style="width: 140px;">
                                        <div class="bc-input-group">
                                            <input type="number" class="bc-input text-center pe-5" value="30">
                                            <span class="position-absolute end-0 me-3 small text-muted">Min</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 交互悬浮保存 -->
                    <div class="bc-card border-primary border-opacity-10" style="background: rgba(37, 99, 235, 0.02);">
                        <div class="bc-card-body p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="d-flex align-items-center gap-2 text-primary">
                                    <i class="bi bi-info-circle-fill"></i>
                                    <span class="small fw-500">提示：修改部分核心参数可能需要重启应用节点后才能完全生效</span>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn bc-btn-secondary" onclick="location.reload()">放弃本次更改</button>
                                    <button class="btn bc-btn-primary px-4" id="saveSettingsBtn">同步并应用配置</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部页脚 -->
        <div th:replace="~{common/fragments :: footer}"></div>
    </div>

    <!-- 通用确认弹窗 (必须放在 body 直接子节点以确保 fixed 定位不被 container 动画干扰) -->
    <div th:replace="~{common/fragments :: confirm-modal}"></div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <!-- 公共JavaScript -->
    <script src="/js/common.js"></script>
    
    <script>
        $(document).ready(function() {
            // 分类切换视觉反馈
            $('.settings-nav-item').click(function(e) {
                $('.settings-nav-item').removeClass('active');
                $(this).addClass('active');
                BC.toast('正在加载: ' + $(this).find('span').text(), 'info');
            });

            // 模拟保存逻辑
            $('#saveSettingsBtn').click(function() {
                const btn = $(this);
                const originalText = btn.html();
                
                btn.html('<span class="spinner-border spinner-border-sm me-2"></span> 同步集群节点...');
                btn.prop('disabled', true);
                
                setTimeout(() => {
                    btn.html(originalText);
                    btn.prop('disabled', false);
                    BC.toast('全局同步成功：核心配置已分发至所有应用节点', 'success');
                }, 1800);
            });
        });
    </script>
</body>
</html>
