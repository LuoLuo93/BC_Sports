<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单管理 - BC体育巅峰后台</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 自定义CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <!-- 侧边栏 -->
    <div th:replace="~{common/fragments :: sidebar}"></div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 顶部导航 -->
        <nav th:replace="~{common/fragments :: top-navbar}"></nav>

        <!-- 内容区域 -->
        <div class="content-wrapper">
            <!-- 菜单管理内容 -->
            <div class="bc-card">
                <div class="bc-card-body">
                    <div class="bc-toolbar d-flex justify-content-end" shiro:hasPermission="menu:add">
                        <button class="btn bc-btn-success" id="addMenuBtn">
                            <i class="bi bi-plus-lg"></i> 新增根菜单
                        </button>
                    </div>
                    <div class="bc-table-container" id="menuTreeContainer">
                        <!-- 折叠式菜单树动态渲染 -->
                    </div>
                </div>
            </div>
        </div>

    <!-- 底部页脚 -->
        <div th:replace="~{common/fragments :: footer}"></div>
    </div>

    <!-- 通用确认弹窗 (必须放在 body 直接子节点以确保 fixed 定位有效) -->
    <div th:replace="~{common/fragments :: confirm-modal}"></div>

    <!-- 菜单模态框 -->
    <div class="modal fade" id="menuModal" tabindex="-1" aria-labelledby="menuModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bc-modal-content">
                <div class="modal-header bc-modal-header">
                    <h5 class="modal-title bc-modal-title" id="menuModalLabel">
                        <i class="bi bi-plus-circle"></i> <span id="modalTitleText">配置菜单</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body bc-modal-body">
                    <form id="menuForm" class="needs-validation" novalidate>
                        <input type="hidden" id="menuId">
                        
                        <!-- 核心配置：一行两列 -->
                        <div class="bc-form-grid mb-4">
                            <div class="bc-form-group">
                                <label for="parentId" class="bc-form-label">上级菜单</label>
                                <select class="bc-select" id="parentId">
                                    <option value="0">顶级菜单</option>
                                    <!-- 动态加载 -->
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label for="menuType" class="bc-form-label">菜单类型</label>
                                <select class="bc-select" id="menuType">
                                    <option value="0">📁 目录 (Directory)</option>
                                    <option value="1">📄 菜单 (Menu)</option>
                                    <option value="2">⚡ 按钮 (Button/Action)</option>
                                </select>
                            </div>
                        </div>

                        <!-- 基础信息：一行两列 -->
                        <div class="bc-form-grid mb-4">
                            <div class="bc-form-group">
                                <label for="menuName" class="bc-form-label">菜单名称 <span class="text-danger">*</span></label>
                                <input type="text" class="bc-input" id="menuName" placeholder="如：系统设置" required>
                            </div>
                            <div class="bc-form-group">
                                <label for="icon" class="bc-form-label">菜单图标</label>
                                <div class="bc-input-group">
                                    <i class="bi bi-display" id="iconPreview"></i>
                                    <input type="text" class="bc-input" id="icon" placeholder="如：bi-people">
                                </div>
                            </div>
                        </div>

                        <!-- 路由配置：一行两列 -->
                        <div class="bc-form-grid mb-4">
                            <div class="bc-form-group">
                                <label for="path" class="bc-form-label">路由路径</label>
                                <input type="text" class="bc-input" id="path" placeholder="/system/settings">
                            </div>
                            <div class="bc-form-group">
                                <label for="permission" class="bc-form-label">权限标识</label>
                                <input type="text" class="bc-input" id="permission" placeholder="system:user:view">
                            </div>
                        </div>

                        <!-- 扩展配置：一行三列 -->
                        <div class="bc-form-grid bc-form-grid-3">
                            <div class="bc-form-group">
                                <label for="sort" class="bc-form-label">显示排序</label>
                                <input type="number" class="bc-input" id="sort" value="0">
                            </div>
                            <div class="bc-form-group">
                                <label for="status" class="bc-form-label">状态</label>
                                <select class="bc-select" id="status">
                                    <option value="1">启用</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                            <div class="bc-form-group">
                                <label for="visible" class="bc-form-label">侧栏显示</label>
                                <select class="bc-select" id="visible">
                                    <option value="1">显示</option>
                                    <option value="0">隐藏</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bc-modal-footer">
                    <button type="button" class="btn bc-btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn bc-btn-primary" id="saveMenuBtn">保存配置</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script th:inline="javascript">
        window.userPermissions = /*[[${permissions}]]*/ [];
    </script>
    <!-- 公共JavaScript -->
    <script src="/js/common.js"></script>
    
    <script>
        $(document).ready(function() {
            loadMenuData();
            
            // 图标即时预览
            $('#icon').on('input', function() {
                var icon = $(this).val() || 'bi-display';
                $('#iconPreview').attr('class', 'bi ' + icon);
            });

            $('#addMenuBtn').click(function() {
                resetMenuForm();
                $('#modalTitleText').text('新增菜单');
                loadParentMenuOptions();
                BC.showModal('#menuModal');
            });
            
            $('#saveMenuBtn').click(saveMenu);
        });
        
        function loadMenuData() {
            BC.ajax({
                url: '/api/menu/tree',
                type: 'GET',
                success: function(response) {
                    renderMenuTable(response);
                }
            });
        }

        function addSubMenu(parentId, parentName) {
            resetMenuForm();
            $('#modalTitleText').text('新增子菜单 - ' + parentName);
            loadParentMenuOptions(function() {
                $('#parentId').val(parentId);
                BC.showModal('#menuModal');
            });
        }
        
        var _menuUid = 0;

        function renderMenuTable(menus) {
            var container = $('#menuTreeContainer');
            container.empty();
            _menuUid = 0;

            if (!menus || menus.length === 0) {
                container.html('<div class="text-center py-5"><i class="bi bi-list-nested" style="font-size:2rem;color:#cbd5e1;"></i><p class="text-muted mt-2 mb-0">暂无菜单数据</p></div>');
                return;
            }

            menus.forEach(function(menu) {
                container.append(buildCollapseCard(menu, 0));
            });

            container.off('click', '.bc-collapse-header').on('click', '.bc-collapse-header', function(e) {
                if ($(e.target).closest('.bc-collapse-actions').length) return;
                var target = $(this).data('target');
                var body = $('#' + target);
                var arrow = $(this).find('.bc-collapse-arrow');
                body.toggleClass('open');
                arrow.toggleClass('open');
                $(this).toggleClass('expanded');
            });
        }

        function makeTypeTag(type) {
            switch(type) {
                case 0: return BC.getTag('info', '目录');
                case 1: return BC.getTag('success', '菜单');
                case 2: return BC.getTag('warning', '按钮');
                default: return '';
            }
        }
        function makeTypeIcon(type) {
            switch(type) {
                case 0: return 'bi-folder';
                case 1: return 'bi-file-earmark';
                case 2: return 'bi-lightning';
                default: return 'bi-circle-small';
            }
        }
        function makeActions(menu) {
            var cfg = [];
            if (menu.menuType !== 2 && BC.hasPermission('menu:add')) {
                cfg.push({ icon: 'bi-plus-lg', title: '添加子菜单', onclick: "addSubMenu('" + menu.id + "', " + JSON.stringify(menu.menuName) + ")" });
            }
            if (BC.hasPermission('menu:edit')) {
                cfg.push({ icon: 'bi-pencil', title: '编辑', onclick: "editMenu('" + menu.id + "')" });
            }
            if (BC.hasPermission('menu:delete')) {
                cfg.push({ icon: 'bi-trash', title: '删除', onclick: "deleteMenu('" + menu.id + "')" });
            }
            return '<div class="bc-collapse-actions">' + BC.getTableActions(cfg) + '</div>';
        }

        function buildCollapseCard(menu, depth) {
            var typeTag = makeTypeTag(menu.menuType);
            var iconCls = menu.icon || makeTypeIcon(menu.menuType);
            var statusTag = BC.getTag(menu.status === 1 ? 'success' : 'danger', menu.status === 1 ? '启用' : '禁用');
            var hasChildren = menu.children && menu.children.length > 0;
            var uid = 'menu-' + (_menuUid++);
            var childCount = hasChildren ? menu.children.length : 0;

            // 有子菜单：渲染为折叠卡片
            if (hasChildren) {
                var h = '<div class="bc-collapse-card" style="--tree-depth:' + depth + '">';
                h += '<div class="bc-collapse-header" data-target="' + uid + '">';
                h +=   '<div class="bc-collapse-title">';
                h +=     '<i class="bi bi-chevron-right bc-collapse-arrow"></i>';
                h +=     '<i class="bi ' + BC.escapeHtml(iconCls) + '" style="color:var(--bc-primary);font-size:var(--bc-text-lg);"></i>';
                h +=     '<span>' + BC.escapeHtml(menu.menuName) + '</span>';
                h +=     typeTag + statusTag;
                h +=     '<span style="font-size:var(--bc-text-xs);color:var(--bc-text-muted);">' + childCount + '项</span>';
                h +=   '</div>';
                h +=   '<div class="bc-collapse-meta">';
                if (menu.path) h += '<code>' + BC.escapeHtml(menu.path) + '</code>';
                if (menu.sort) h += '<span>排序 ' + menu.sort + '</span>';
                h +=   '</div>';
                h +=   makeActions(menu);
                h += '</div>';

                h += '<div class="bc-collapse-body" id="' + uid + '">';
                if (childCount === 0) {
                    h += '<div class="bc-collapse-empty"><i class="bi bi-inbox me-1"></i>暂无子菜单</div>';
                } else {
                    menu.children.forEach(function(child) {
                        if (child.children && child.children.length > 0) {
                            h += buildCollapseCard(child, depth + 1);
                        } else {
                            h += buildLeafItem(child, depth + 1);
                        }
                    });
                }
                h += '</div></div>';
                return h;
            }

            // 无子菜单：单行展示
            return buildLeafItem(menu, depth, iconCls, typeTag);
        }

        function buildLeafItem(menu, depth, iconCls, typeTag) {
            depth = depth || 0;
            typeTag = typeTag || makeTypeTag(menu.menuType);
            iconCls = iconCls || menu.icon || makeTypeIcon(menu.menuType);
            var statusTag = BC.getTag(menu.status === 1 ? 'success' : 'danger', menu.status === 1 ? '启用' : '禁用');

            var h = '<div class="bc-collapse-item" style="--tree-depth:' + depth + '">';
            h +=   '<div class="bc-collapse-item-info">';
            h +=     '<span class="bc-collapse-item-dot"></span>';
            h +=     '<i class="bi ' + BC.escapeHtml(iconCls) + '" style="color:var(--bc-text-muted);"></i>';
            h +=     '<span>' + BC.escapeHtml(menu.menuName) + '</span>';
            h +=     typeTag + statusTag;
            h +=   '</div>';
            h +=   '<div class="bc-collapse-item-detail">';
            if (menu.path) h += '<code>' + BC.escapeHtml(menu.path) + '</code>';
            if (menu.permission) h += '<span>' + BC.escapeHtml(menu.permission) + '</span>';
            if (menu.sort) h += '<span>排序 ' + menu.sort + '</span>';
            h +=   '</div>';
            h +=   makeActions(menu);
            h += '</div>';
            return h;
        }
        
        function loadParentMenuOptions(callback) {
            BC.ajax({
                url: '/api/menu/tree',
                type: 'GET',
                success: function(response) {
                    var select = $('#parentId');
                    select.empty().append('<option value="0">顶级菜单</option>');
                    function addOptions(list, level) {
                        $.each(list, function(i, menu) {
                            var prefix = '　'.repeat(level);
                            select.append('<option value="' + BC.escapeHtml(menu.id) + '">' + prefix + BC.escapeHtml(menu.menuName) + '</option>');
                            if (menu.children && menu.children.length > 0) addOptions(menu.children, level + 1);
                        });
                    }
                    addOptions(response, 0);
                    if (callback) callback();
                }
            });
        }
        
        function resetMenuForm() {
            $('#menuForm')[0].reset();
            $('#menuId').val('');
            $('#iconPreview').attr('class', 'bi bi-display');
        }
        
        function editMenu(id) {
            BC.ajax({
                url: '/api/menu/' + id,
                type: 'GET',
                success: function(res) {
                    var m = res;
                    $('#menuId').val(m.id);
                    $('#menuName').val(m.menuName);
                    $('#icon').val(m.icon).trigger('input');
                    $('#menuType').val(m.menuType);
                    $('#path').val(m.path);
                    $('#permission').val(m.permission);
                    $('#sort').val(m.sort);
                    $('#status').val(m.status);
                    $('#visible').val(m.visible);

                    loadParentMenuOptions();
                    setTimeout(() => $('#parentId').val(m.parentId), 300);

                    $('#modalTitleText').text('编辑菜单配置');
                    BC.showModal('#menuModal');
                }
            });
        }
        
        function saveMenu() {
            var data = {
                parentId: $('#parentId').val(),
                menuName: $('#menuName').val(),
                icon: $('#icon').val(),
                menuType: parseInt($('#menuType').val()),
                path: $('#path').val(),
                permission: $('#permission').val(),
                sort: parseInt($('#sort').val()),
                status: parseInt($('#status').val()),
                visible: parseInt($('#visible').val())
            };
            
            var id = $('#menuId').val();
            var url = id ? '/api/menu/' + id : '/api/menu';
            var type = id ? 'PUT' : 'POST';
            
            BC.ajax({
                url: url,
                type: type,
                data: data,
                success: function(res) {
                    BC.hideModal('#menuModal');
                    setTimeout(function() {
                        BC.alert({
                            title: '配置已同步',
                            message: '此菜单架构配置已更新并实时生效',
                            type: 'success'
                        }, function() {
                            loadMenuData();
                            sessionStorage.removeItem('cachedMenus');
                        });
                    }, 300);
                }
            });
        }
        
        function deleteMenu(id) {
            BC.confirm({
                title: '确认架构变更',
                message: '确定要移除此菜单索引吗？级联下属菜单也将一并失效且不可恢复。',
                type: 'danger',
                confirmText: '确认移除',
                cancelText: '取消'
            }, function(confirmed) {
                if (confirmed) {
                    BC.ajax({
                        url: '/api/menu/' + id,
                        type: 'DELETE',
                        success: function(res) {
                            BC.toast('菜单架构项已成功移除', 'success');
                            loadMenuData();
                            sessionStorage.removeItem('cachedMenus');
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
