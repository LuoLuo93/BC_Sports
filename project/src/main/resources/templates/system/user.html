<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - BC体育后台管理系统</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 自定义CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>
    <!-- 侧边栏 -->
    <div th:replace="~{common/fragments :: sidebar}"></div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 顶部导航 -->
        <nav th:replace="~{common/fragments :: top-navbar}"></nav>

        <!-- 内容区域 -->
        <div class="content-wrapper">
            <!-- 用户管理内容 -->
            <div class="bc-card">
                <div class="bc-card-body">
                    <!-- 搜索表单 -->
                    <form class="row g-3 bc-toolbar align-items-center" id="searchForm">
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-person"></i>
                                <input type="text" class="bc-input" id="searchUsername" placeholder="用户名">
                            </div>
                        </div>
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-tag"></i>
                                <input type="text" class="bc-input" id="searchNickname" placeholder="昵称">
                            </div>
                        </div>
                        <div class="col-auto">
                            <div class="bc-input-group">
                                <i class="bi bi-telephone"></i>
                                <input type="text" class="bc-input" id="searchPhone" placeholder="手机号">
                            </div>
                        </div>
                        <div class="col-auto">
                            <select class="bc-select" id="searchStatus">
                                <option value="">全部状态</option>
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn bc-btn-primary" onclick="searchUsers()">
                                <i class="bi bi-search"></i> 搜索
                            </button>
                            <button type="button" class="btn bc-btn-secondary" onclick="resetSearch()">
                                <i class="bi bi-arrow-counterclockwise"></i> 重置
                            </button>
                        </div>
                        <div class="col-auto ms-auto" shiro:hasPermission="system:user:add">
                            <button type="button" class="btn bc-btn-success" onclick="addUser()">
                                <i class="bi bi-plus-lg"></i> 新增用户
                            </button>
                        </div>
                    </form>
                    <div class="bc-table-container">
                        <table class="bc-table bc-table-hover">
                            <thead>
                                <tr>
                                    <th style="width: 60px;">#</th>
                                    <th>用户名</th>
                                    <th>昵称</th>
                                    <th>手机号</th>
                                    <th>部门</th>
                                    <th>角色</th>
                                    <th>排序</th>
                                    <th>状态</th>
                                    <th style="width: 100px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody">
                                <!-- 动态加载用户数据 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 分页控件 -->
            <div th:replace="~{common/fragments :: pagination}"></div>
        </div>

        <!-- 底部页脚 -->
        <div th:replace="~{common/fragments :: footer}"></div>
    </div>

    <!-- 通用确认弹窗 (必须放在 body 直接子节点以确保 fixed 定位不被 container 动画干扰) -->
    <div th:replace="~{common/fragments :: confirm-modal}"></div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script th:inline="javascript">
        window.userPermissions = /*[[${permissions}]]*/ [];
    </script>

    <!-- 公共JavaScript -->
    <script src="/js/common.js"></script>

    <!-- 用户管理JavaScript -->
    <script>
        var currentPage = 1;
        var pageSize = 10;

        $(document).ready(function () {
            loadUsers();
            loadRoles();
            loadDepts();
        });

        function loadRoles() {
            BC.ajax({
                url: '/api/role/list',
                type: 'GET',
                success: function (res) {
                    var roles = res;
                    var container = $('#roles');
                    container.empty();
                    roles.forEach(function (role) {
                        container.append(
                            '<label class="bc-role-tag">' +
                            '<input type="checkbox" value="' + BC.escapeHtml(role.id) + '">' +
                            '<span>' + BC.escapeHtml(role.roleName) + '</span>' +
                            '</label>'
                        );
                    });
                    // 点击切换选中样式
                    container.on('change', 'input[type="checkbox"]', function () {
                        $(this).closest('.bc-role-tag').toggleClass('active', this.checked);
                    });
                },
                error: function () {
                    console.error('网络错误，无法加载角色数据');
                }
            });
        }

        function loadDepts() {
            // 加载部门树
            BC.ajax({
                url: '/api/dept/list',
                type: 'GET',
                success: function (res) {
                    var depts = res;
                    var deptSelect = $('#deptId');
                    deptSelect.empty();
                    deptSelect.append('<option value="">-- 请选择部门 --</option>');

                    function addOptions(deptList, level) {
                        $.each(deptList, function (index, dept) {
                            var indent = '';
                            for (var i = 0; i < level; i++) {
                                indent += '　';
                            }
                            deptSelect.append('<option value="' + BC.escapeHtml(dept.id) + '">' + indent + BC.escapeHtml(dept.deptName) + '</option>');
                            if (dept.children && dept.children.length > 0) {
                                addOptions(dept.children, level + 1);
                            }
                        });
                    }
                    addOptions(depts, 0);
                }
            });
        }

        function loadUsers() {
            var searchData = {
                pageNum: currentPage,
                pageSize: pageSize
            };

            var username = $('#searchUsername').val();
            var nickname = $('#searchNickname').val();
            var phone = $('#searchPhone').val();
            var status = $('#searchStatus').val();

            if (username) searchData.username = username;
            if (nickname) searchData.nickname = nickname;
            if (phone) searchData.phone = phone;
            if (status) searchData.status = status;

            BC.ajax({
                url: '/api/user/page',
                type: 'GET',
                data: searchData,
                success: function (res) {
                    var pageResult = res;
                    var users = pageResult.records;
                    var tbody = $('#userTableBody');
                    tbody.empty();

                    var pageNum = pageResult.pageNum;
                    var pageSize = pageResult.pageSize;

                    users.forEach(function (user, i) {
                        var seq = (pageNum - 1) * pageSize + i + 1;
                        var statusTag = BC.getTag(user.status === 1 ? 'success' : 'danger', user.status === 1 ? '启用' : '禁用');

                        var roleTags = '';
                        if (user.roleNames) {
                            user.roleNames.split(',').forEach(function(role) {
                                roleTags += BC.getTag('info', role) + ' ';
                            });
                        }

                        var actionsConfig = [];
                        if (BC.hasPermission('system:user:edit')) {
                            actionsConfig.push({ icon: 'bi-pencil', title: '编辑用户', onclick: 'editUser("' + user.id + '")' });
                        }
                        if (BC.hasPermission('system:user:reset')) {
                            actionsConfig.push({ icon: 'bi-key', title: '重置密码', onclick: 'resetPassword("' + user.id + '", ' + JSON.stringify(user.username || '') + ')' });
                        }
                        if (BC.hasPermission('system:user:delete')) {
                            actionsConfig.push({ icon: 'bi-trash', title: '注销用户', onclick: 'deleteUser("' + user.id + '")' });
                        }

                        var actions = BC.getTableActions(actionsConfig);

                        var row = '<tr>' +
                            '<td><span class="text-muted small">' + seq + '</span></td>' +
                            '<td><span class="fw-bold text-main">' + BC.escapeHtml(user.username) + '</span></td>' +
                            '<td>' + BC.escapeHtml(user.nickname || '-') + '</td>' +
                            '<td><span class="small text-muted">' + BC.escapeHtml(user.phone || '-') + '</span></td>' +
                            '<td><span class="bc-tag bc-tag-secondary">' + BC.escapeHtml(user.deptName || '未分配') + '</span></td>' +
                            '<td>' + (roleTags || '-') + '</td>' +
                            '<td><span class="small">' + (user.sort || 0) + '</span></td>' +
                            '<td>' + statusTag + '</td>' +
                            '<td class="text-end">' + actions + '</td>' +
                            '</tr>';
                        tbody.append(row);
                    });

                    BC.renderPagination({
                        total: pageResult.total,
                        pages: pageResult.pages,
                        current: currentPage,
                        callback: function (pageNum) {
                            currentPage = pageNum;
                            loadUsers();
                        }
                    });
                }
            });
        }

        function searchUsers() {
            currentPage = 1;
            loadUsers();
        }

        function resetSearch() {
            $('#searchUsername').val('');
            $('#searchNickname').val('');
            $('#searchPhone').val('');
            $('#searchStatus').val('');
            currentPage = 1;
            loadUsers();
        }

        function addUser() {
            $('#userForm')[0].reset();
            $('#userId').val('');
            $('#passwordGroup').show();
            $('#password').attr('required', true);
            $('#userModalLabel').text('新增用户');
            BC.showModal('#userModal');
        }

        function editUser(id) {
            BC.ajax({
                url: '/api/user/' + id,
                type: 'GET',
                success: function (res) {
                    var user = res;
                    $('#userId').val(user.id);
                    $('#username').val(user.username);
                    $('#passwordGroup').hide();
                    $('#password').removeAttr('required');
                    $('#nickname').val(user.nickname);
                    $('#email').val(user.email);
                    $('#phone').val(user.phone);
                    $('#deptId').val(user.deptId || '');
                    $('#sort').val(user.sort || 0);
                    $('#status').val(user.status);
                    $('#remark').val(user.remark);
                    loadUserRoles(user.id);
                    $('#userModalLabel').text('编辑用户');
                    BC.showModal('#userModal');
                }
            });
        }

        function loadUserRoles(userId) {
            $('#roles input[type="checkbox"]').prop('checked', false).closest('.bc-role-tag').removeClass('active');
            BC.ajax({
                url: '/api/user/' + userId + '/roles',
                type: 'GET',
                success: function (res) {
                    var roleIds = res;
                    roleIds.forEach(function (roleId) {
                        $('#roles input[value="' + roleId + '"]').prop('checked', true).closest('.bc-role-tag').addClass('active');
                    });
                }
            });
        }

        function saveUser() {
            var form = document.getElementById('userForm');
            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return;
            }

            var userId = $('#userId').val();
            var userData = {
                username: $('#username').val(),
                nickname: $('#nickname').val(),
                email: $('#email').val(),
                phone: $('#phone').val(),
                deptId: $('#deptId').val(),
                sort: parseInt($('#sort').val() || 0),
                status: parseInt($('#status').val()),
                remark: $('#remark').val()
            };

            if (!userId) userData.password = $('#password').val();
            var roleIds = [];
            $('#roles input[type="checkbox"]:checked').each(function () {
                roleIds.push($(this).val());
            });
            userData.roleIds = roleIds;

            var url = userId ? '/api/user/' + userId : '/api/user';
            var type = userId ? 'PUT' : 'POST';

            BC.ajax({
                url: url,
                type: type,
                data: userData,
                success: function () {
                    // 使用原生 Bootstrap 5 API 确保更可靠的隐藏
                    BC.hideModal('#userModal');

                    BC.toast('用户记录保存成功', 'success');
                    loadUsers();
                },
                error: function (msg) {
                    BC.toast(msg || '系统同步失败', 'error');
                }
            });
        }

        function resetPassword(id, username) {
            $('#resetUserId').val(id);
            $('#resetUsernameDisp').text(username);
            $('#newRawPassword').val('');
            BC.showModal('#resetModal');
        }

        function saveResetPassword() {
            var userId = $('#resetUserId').val();
            var newPassword = $('#newRawPassword').val();
            
            if (!newPassword || newPassword.length < 6) {
                BC.toast('有效密码长度需大于6位', 'warning');
                return;
            }

            BC.ajax({
                url: '/api/user/' + userId + '/resetPassword',
                type: 'PUT',
                data: { newPassword: newPassword },
                success: function () {
                    BC.hideModal('#resetModal');
                    BC.toast('系统已重置该用户密码', 'success');
                }
            });
        }

        function deleteUser(id) {
            BC.confirm({
                title: '高度警示',
                message: '确定要彻底移除此用户吗？底层权限将立即失效，此操作无法撤销。',
                type: 'danger',
                confirmText: '确认执行',
                cancelText: '取消'
            }, function (confirmed) {
                if (confirmed) {
                    BC.ajax({
                        url: '/api/user/' + id,
                        type: 'DELETE',
                        success: function () {
                            BC.toast('指定用户已从系统移除', 'success');
                            loadUsers();
                        }
                    });
                }
            });
        }
    </script>

    <!-- 用户模态框 -->
    <div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="userModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bc-modal-content">
                <div class="modal-header bc-modal-header">
                    <h5 class="modal-title bc-modal-title" id="userModalLabel">
                        <i class="bi bi-person-plus"></i> <span id="modalTitleText">新增用户</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body bc-modal-body">
                    <form id="userForm">
                        <input type="hidden" id="userId">
                        <div class="bc-form-grid bc-form-grid-3 mb-4">
                            <div class="bc-form-group">
                                <label for="username" class="bc-form-label">用户名 <span class="text-danger">*</span></label>
                                <input type="text" class="bc-input" id="username" placeholder="请输入用户名" required>
                            </div>
                            <div class="bc-form-group" id="passwordGroup">
                                <label for="password" class="bc-form-label">密码 <span class="text-danger">*</span></label>
                                <input type="password" class="bc-input" id="password" placeholder="请输入密码" required>
                            </div>
                            <div class="bc-form-group">
                                <label for="nickname" class="bc-form-label">昵称 <span class="text-danger">*</span></label>
                                <input type="text" class="bc-input" id="nickname" placeholder="请输入昵称" required>
                            </div>
                            <div class="bc-form-group">
                                <label for="email" class="bc-form-label">邮箱</label>
                                <input type="email" class="bc-input" id="email" placeholder="example@bcsport.com">
                            </div>
                            <div class="bc-form-group">
                                <label for="phone" class="bc-form-label">手机号</label>
                                <input type="text" class="bc-input" id="phone" placeholder="请输入手机号">
                            </div>
                            <div class="bc-form-group">
                                <label for="deptId" class="bc-form-label">所属部门</label>
                                <select class="bc-select" id="deptId"></select>
                            </div>
                        </div>
                        <div class="bc-form-grid">
                            <div class="bc-form-group">
                                <label for="sort" class="bc-form-label">排序权重</label>
                                <input type="number" class="bc-input" id="sort" value="0">
                            </div>
                            <div class="bc-form-group">
                                <label for="status" class="bc-form-label">状态</label>
                                <select class="bc-select" id="status">
                                    <option value="1">启用</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                            <div class="bc-form-group bc-form-group-full">
                                <label class="bc-form-label">分配角色 <span class="text-danger">*</span></label>
                                <div id="roles" class="bc-role-tags"></div>
                            </div>
                            <div class="bc-form-group bc-form-group-full">
                                <label for="remark" class="bc-form-label">备注</label>
                                <textarea class="bc-textarea" id="remark" rows="2" placeholder="请输入备注信息"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bc-modal-footer">
                    <button type="button" class="btn bc-btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn bc-btn-primary" onclick="saveUser()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 重置密码模态框 -->
    <div class="modal fade" id="resetModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm">
            <div class="modal-content bc-modal-content">
                <div class="modal-header bc-modal-header">
                    <h5 class="modal-title bc-modal-title"><i class="bi bi-key"></i> 重置密码</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bc-modal-body">
                    <p class="small text-muted mb-3">正在为用户 <strong id="resetUsernameDisp" class="text-primary"></strong> 设置新密码</p>
                    <input type="hidden" id="resetUserId">
                    <div class="bc-form-group">
                        <label class="bc-form-label">新密码</label>
                        <input type="password" class="bc-input" id="newRawPassword" placeholder="输入 6-20 位新密码">
                    </div>
                </div>
                <div class="modal-footer bc-modal-footer">
                    <button type="button" class="btn bc-btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn bc-btn-primary" onclick="saveResetPassword()">确认重置</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
